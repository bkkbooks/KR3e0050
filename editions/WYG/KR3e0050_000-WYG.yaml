  text: 欽定四庫全書子部五
  hash: sha256:385bc2d94867d1b606f43bb11ebdc68a3a5579aafe48be2b02b9eb652717f689
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0050_WYG_000-1a, image: WYG0745/WYG0745-0001a.png}
body:
  text: 保命集醫家類提要臣等謹案保命集三卷金張元素撰元素字潔古易州人八歳應童子舉二十七試進士以犯廟諱下第乃去而學醫精通其術因抒所心得述為此書凡分三十二門首原道原脈攝生隂陽諸論次及處方用藥次第加減君臣佐使之法於醫理精藴闡發極為深至其書初罕傳播金末楊威始得其本刋行之而題為河間劉完素所著明初寧王權重刋亦沿其誤并偽撰完素序文詞調於卷首以附㑹之至李時珍作本草綱目始糾其謬而定為出於元素之手於序例中辨之甚明考李濓醫史稱完素嘗病傷寒八日頭痛脈𦂳嘔逆不食元素往候令服某藥完素大服如其言遂愈元素自此顯名是其造詣深邃足以自成一家原不必託完素以為重今特為改正其偽託之序亦並從刪削焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀保命集原序天興末予北渡寓東原之長清一日過前太醫王慶先家於几案間得一書曰素問病機氣宜保命集試閱之廼劉髙尚守真先生之遺書藁也其文則出自内經中摭其要而述之者朱塗墨注凡三卷分三十二門門有資次合理契經如原道則本性命之源論脉則盡死生之說攝生則語存神養氣之理隂陽則講抱元守一之妙病機則終始有條有例治病之法盡于此矣本草則驅用有佐有使處方之法盡于此矣至於解傷寒論氣宜論曲盡前聖意讀之使人廓然有所醒悟恍然有所發明使六脉十二經五臟六腑三焦四肢目前可得而推見之也後二十三論隨論出證隨證出方先後加減用藥次第悉皆蘊奥精妙入神嘗試用之一一皆中真良醫也雖古人不是過也雖軒岐復生不廢此書也然先生有序序已行藏言幼年已有直格宣明原病式三書雖義理精確猶有不盡聖理處今是書也復出與前三書相為表裏非曰後之醫者龜鏡歟至如平昔不治醫書者得之隨例驗證度已處藥則思亦過半矣予謂是書雖在農夫工販緇衣黃冠儒宗人人家置一本可也若已有病尋閲病源不至亂投湯劑况醫家者流哉惜哉先生卒書不世傳使先生之道竊入小人口以為已書者有之予憫先生道屏翳于􅈋茨荆棘中故存心精校今數年矣命工鏤板擬廣世傳使先生之道出于茒茨荆棘中亦起世膏肓之一端也嵗辛亥正月望日大鹵楊威序
