body:
  text: 保命集卷下金張元素撰欬嗽論第二十一論曰欬謂無痰而有聲肺氣傷而不清也嗽是無聲而有痰脾濕動而為痰也欬嗽謂有痰而有聲盖因傷於肺氣動於脾濕欬而為嗽也脾濕者秋傷於濕積于脾也故内經曰秋傷于濕冬必欬嗽大抵素秋之氣宜清肅反動之氣必上衝而為欬甚則動于脾濕發而為痰焉是知脾無留濕雖傷肺氣而不為痰也有痰寒少而熱多故欬嗽者非專主于肺而為病以肺主皮毛而司於外故風寒先能傷之也内經曰五臟六府皆能令人欬非獨肺也各以其時主之而受病焉非其時各傳而與之也所病不等寒暑燥濕風火六氣皆令人欬唯濕病痰飲入胃留之而不行上入于肺則為欬嗽假令濕在于心經謂之熱痰濕在肝經謂之風痰濕在肺經謂之氣痰濕在腎經謂之寒痰所治不同宜隨證而治之若欬而無痰者以辛甘潤其肺故欬嗽者治痰為先治痰者下氣為上是以南星半夏勝其痰而欬嗽自愈枳殻陳皮利其氣而痰自下痰而能食者大承氣湯微下之少利為度痰而不能食者厚朴湯治之夏月嗽而發熱者謂之熱痰嗽小柴胡四两加石膏一两知母半两用之冬月嗽而發寒熱謂之寒嗽小青龍加杏仁服之然此為大例更當隨證隨時加减之量其虚實此治法之大體也蜜煎生薑湯蜜煎橘皮湯燒生薑胡桃此者皆治無痰而嗽者當辛甘潤其肺故也如但使青陳皮藥皆當去白本草云陳皮味辛理上氣去痰氣滯塞青皮味苦理下氣二味俱用散三焦之氣也故聖濟云陳皮去痰穰不除即生痰麻黄發汗節不去而止汗治風痰熱咳嗽其脉弦面青四肢滿悶便溺秘澁心多燥怒水煑金花丸南星半夏各一兩生用天麻五錢雄黄二錢白麵三兩寒水石一兩燒存性右為細末滴水為丸每服五七十丸至百丸煎漿水沸下藥煑令浮胃度漉出淡漿水浸另用生薑湯下或通聖加半夏及局方中川芎丸防風丸皆可用也小黄丸治熱痰欬嗽脉洪面赤煩熱心痛唇口乾燥多喜笑宜小黄丸南星湯洗半夏洗各一兩黄芩一兩半右為細末生薑汁浸蒸餅為桐子大每服五十丸至七十丸食後薑湯下及小柴胡湯中加半夏亦可白术丸治痰濕欬嗽脉緩面黄肢體沉重嗜卧不收腹脹而食不消化宜白术丸南星半夏俱湯洗各一兩白术一兩半右為細末糊為丸桐子大每服五七十丸生薑湯下及局方中防己丸亦可用玉粉丸治氣痰欬嗽脉澁面白上喘氣促洒淅惡寒愁不樂宜服之南星半夏俱洗各一两官桂去皮一两右為細末糊為丸如桐子大毎服五七十丸生薑湯下食後及局方中防己丸亦可玉粉丸加减在後心下痞者加枳實五錢身熱甚者加連五錢體重者加茯苓一两氣上逆者加苦亭藶五錢氣促者加人參桔梗各五錢浮腫者加郁李仁杏仁各五錢大便秘者加大黄五錢雙玉散治痰熱而喘痰湧如泉寒水石石膏各等分右為細末煎人參湯調下三錢食後服治痰千緡湯半夏生味一两大皂角去皮子半两剉碎右同於絹袋中盛之用水三升生薑七大片同煎至一半以手操洗之取清汁分作三服食後併服二服效防風丸治痰嗽胷中氣不清利者枳术丸亦妙防風半两枳殻半两去穰麩炒白术一两右細末燒飯為丸毎服五七十丸生薑湯下天麻丸天麻一两半夏南星各一两雄黄少許右以白麵二两滴水為丸如桐子大毎服五十丸至百丸煎淡水令沸下藥煮十餘沸漉出食前生薑湯下利鬲丸主胷中不利痰嗽喘促利脾胃壅滯調秘瀉藏推陳致新消進飲食治利鬲氣之勝藥也木香一錢半檳榔一錢半人參三錢當歸二錢藿香一錢半大黄酒浸焙一两厚朴薑制三两枳實一两炒甘草五錢炙右為細末滴水和丸如桐子大毎服三五十丸食後諸飲皆下欵氣丸治久𠻳痰喘肺氣浮腫青皮去白陳皮去白檳榔木香杏仁去皮尖郁李仁去皮茯芩澤瀉當歸茂炮馬兠鈴苦亭藶已上各三两人參防己各五錢牽牛取頭末一两右為細末生薑汁麵糊為丸如梧子大每服一二十丸加至五七十丸生薑湯下食後玉粉丸治痰結咽喉不利語音不出半夏洗五錢草烏一字少桂一字多右同為末生薑汁浸蒸餅為丸如雞頭大毎服一丸至夜含化多嵗不愈者亦效枳殻湯治久痰胷鬲不利者多上焦發熱枳殻麩炒去穰二两桔梗三两黄芩一两半右同剉毎日早用二两半水三盞煎至二盞勻作三服午時一服中時一服臨卧時一服三日七两半藥盡服生半夏湯生半夏湯半夏不以多少洗七遍切作片子右每服秤三錢水一盞半入生薑五大片同煎至一盞和滓食後服一日三二服服三日畢再服枳术丸盡其痰為度論曰先消胷中氣後去鬲上痰再服枳术丸謂首尾合盡消其氣謂令痰不復作也清鎮丸治熱嗽小柴胡湯内加人參一倍青黛半两右為細末麵糊丸如桐子大每服五十丸生薑湯下半夏丸治因傷風而痰作喘逆兀兀欲吐惡心欲倒已吐加檳榔三錢半夏一两湯洗切雄黄研三錢右同為末生薑汁浸蒸餅為丸桐子大毎服三十丸生薑湯下小児丸如􅎟米大白术散治夏暑大熱或醉飲冷痰濕不止膈不利白术茯苓半夏洗黄芩各等分右為麄末每服五錢至七錢水二盞入生薑十片煎至一盞去滓調陳皮末一錢神麹末一錢食後法曰大熱大飲盖酒味熱而引飲冷冷與熱凝於胷中不散而成濕故痰作矣甚者宜吐之吐後服五苓甘露勝濕去痰之劑白术湯治痰潮上如湧泉乆不可治者白术白茯苓半夏等分右為末毎服半两病大者一两水二盞生薑七片煎至一盞取清調神麹末二錢頓服之病甚者下玉壺丸一百丸大效永除根天門冬丸治婦人喘手足煩熱骨蒸寝汗口乾引飲面目浮腫天門冬十两去心秤麥門冬去心八两生地黄三斤取汁為膏子右二味為末膏子和丸如梧子大每服五十丸煎逍遥散送逍遥散中去甘草加人參或服王氏博濟方中人參荆芥散亦可如面腫不已經曰面腫曰風故宜汗麻黄桂枝可發其汗後服柴胡飲子去大黄故論曰治藏者治其俞治府者治其合浮腫者治其經治俞者治其土也治合者亦治其土也如兵家圍魏救趙之法也虚損論第二十二論曰虛損之疾寒熱因虛而感也感寒則損陽陽虚則隂盛損自上而下治之宜以辛甘淡過于胃則不可治也感熱則損隂隂虚則陽盛故損自下而上治之宜以苦酸鹹過于脾則不可治也自上而損者一損于肺皮聚而毛落二損損于心血脉虚少不能榮于藏府婦人月水不通三損損于胃飲食不為肌膚自下而損者一損于腎骨痿不能起于床二損損于肝筋緩不能自收持三損損于脾飲食不能消克論曰心肺損而色蔽腎肝損而形痿糓不能化而脾損感此病者皆損之病也漸漬之深皆虛勞之疾也四君子湯治肺損而皮聚毛落益氣可也白术人參黄耆茯苓各等分右為麄末毎服五錢至七錢水一盞煎至七分去滓食逺溫服八物湯治心肺虛損皮聚而毛落血脉虛損婦人月水愆期宜益氣和血白术人參黄耆茯苓川芎熟地黄當歸芍藥各等分右麄末服五七錢水一盞煎至七分去滓食後温服十全散治心肺損及胃飲食不為肌膚宜益氣和血調飲食白术人參黄耆茯神桂熟地黄當歸川芎芍藥甘草等分右為末加生薑棗同煎水一大盞藥五錢煎至七分食前日三服金剛丸治腎損骨痿不能起于床宜益精萆薢杜仲炒去絲蓯蓉酒浸兎絲子酒浸等分右為細末酒煑猪腰子為丸每服五七十丸空心酒下牛膝丸治腎肝損骨痿不能起于床筋緩不能收持宜益精緩中牛膝酒浸萆薢杜仲炒去絲蓯蓉酒浸防風兎絲子酒浸白蒺䔧各等分桂半之右細末酒煑猪腰子搗丸桐子大空心酒下五七十丸煨腎丸治腎肝損及脾損糓不化宜益精緩中消糓牛􅂰萆薢杜仲蓯蓉兎絲子防風白蒺藜胡蘆巴破故紙等分桂半之右和劑服餌如金剛丸法腰痛不起者甚效黑地黄丸加五味子名腎氣丸治陽盛隂虛脾腎不足房室虚損形瘦無力面多青黄而無常色宜此藥養血益腎蒼术一斤米泔浸熟地黄一斤川薑冬一两夏五錢春七錢五味子半斤右為細末棗肉為丸如梧子大每服一百丸至二百丸食前米飲下或酒治血虛久之甚效經曰腎苦燥急食辛以潤之開腠理致津液通氣五味子味酸故酸以収之此雖陽盛不燥熱乃是五藏虛損於内故可益血収氣也此藥類象神品藥也治陽虚隂盛心肺不足宜八味丸若形體痩弱無力多困未知隂陽先損夏月地黄丸春秋宜腎氣丸冬月宜八味丸消渇論第二十三論曰消渇之疾三焦受病也有上消中消腎消上消者上焦受病又謂之鬲消肺也多飲水而少食大便如常或小便清利知其燥在上焦也治宜流濕潤燥中消者胃也渇而飲食多小便黄經曰熱能消糓知熱在中法云宜下之至不欲飲食則愈腎消者病在下焦初發為膏淋下如膏油之狀至病成而面色黧黒形瘦而耳焦小便㵼而有脂治法宜養血以肅清分其清濁而自愈也法曰燥上而渇辛甘而祛用潤肺故可用蜜煎生薑湯大器頓之時時呷之法云心肺之病莫厭頻而少飲内經云補上治宜以緩又曰辛以潤之開腠致津液通則肺氣下流故氣下火降而燥衰矣其渇乃止又經曰二陽結為消王注曰二陽結於胃及大腸俱熱也腸胃藏熱則善消水糓可甘辛降火之劑黄連末一斤生地黄自然汁白蓮花藕自然汁牛乳汁各一斤熬成膏子劑連末為丸每服桐子大三十丸少呷温水送下日進十服渇病立止治上焦鬲消而不欲多食小便清利宜小柴胡湯或加白虎湯或錢氏中地骨皮散内加芍藥黄耆石膏黄芩桔梗之類是也人參石膏湯治鬲消上焦煩渇不欲多食人參半两石膏一两一錢知毋七錢甘草四錢右為麄末毎服五錢至七錢水煎食後温服順氣散治消中熱在胃而能食小便赤黄㣲利之為效不可多利服此藥漸漸利之不欲多食則愈厚朴薑制一两大黄四两枳實二錢炒右剉每服五錢水煎飰逺服茴香散治腎消病下焦初證小便如膏油茴香炒苦練炒右細末酒調二錢食前八味丸治腎消大病加减法本方内倍加山藥外桂附從四時加减假令方内桂附一两春各用三錢夏用一錢秋用五錢冬全用一两珎珠粉丸治白淫夢泄遺精及滑出而不収黄栢一斤於新瓦上燒令通赤為度真蛤粉一斤右為細末滴水丸如桐子大每服一百丸空心酒下法曰盛陽乗陽故精泄也黄栢降火蛤粉醎而補腎隂也又治思想無窮所願不得之證竹籠散治消渇五靈脂黒豆去皮臍右等為細末每服三錢冬𤓰湯調下無冬𤓰苗葉皆可日二服小渇二三服效渇定不可服熱藥唯服八味丸去附子加五味子腫脹論第二十四小兒附靈樞脹論云帝問岐伯脹形何如岐伯曰夫心脹者煩心氣短卧不安肺脹者虚滿而喘欬肝脹者脇下滿而痛引少腹脾脹者善噦四肢煩悗體重不能勝衣卧不安腎脹者引背央央然腰髀痛六腑脹胃脹者腹滿胃脘痛鼻聞焦臭妨于食大便難大腸脹者腸鳴痛而濯濯冬日重於寒則飱泄食不化小腸脹者小腹䐜滿引腰而痛膀胱脹者少腹氣滿而氣癃三焦脹者氣滿于皮膚中硜硜然而不堅膽脹者脇下痛脹口苦善太息又水脹篇云帝問岐伯水脹何如荅曰水始起也目窠上㣲腫如新卧起之狀其頸脉動欬隂股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如褁水之狀此其候也帝曰膚脹何如岐伯曰膚者寒氣客于皮中鼔空空然不堅腹身大盡腫皮厚按其腹窅而不起腹色不變此其候也鼓脹何如答曰腹脹身皆大大與膚脹等也色蒼黄腹筋起此其候也腸覃何如荅曰寒氣客于腸外與衛相博氣不得榮因有所繫癖而内着惡氣乃起瘜肉生其始大也大如雞子稍以益大至其成如懐子狀乆離歳按之則堅推之則移月事不以時下此其候也石瘕如何答曰石瘕生于胞中寒氣客于子門閉塞氣不通惡血當㵼衃以留止日以益大狀如懐子月事不時皆生於女子可𨗳而下帝曰膚脹鼓脹可刺邪曰先瀉其脹之血絡復調其經刺去其血絡也經云平治權衡去菀陳剉開鬼門潔淨府平治權衡者察脉之浮沉也去菀陳剉者踈滌腸胃也開鬼門潔淨府者發汗利小便也又鼔脹之病治以雞屎醴名醫云其腫有短氣不得卧為心水两脇痛為肝水大便鴨溏為肺水四肢皆腫為脾水腰痛足冷為腎水口苦咽乾為膽水乍虚乍實為大腸水各隨其經絡分其内外審其脉證而别之大有風水皮水石水黄汗推各藏以論之風合歸肝皮合歸肺黄汗歸脾石合歸腎風水脉浮必惡風皮水脉亦浮按下没指石水脉沉腹滿不喘黄汗脉沉遲發熱而多涎久而不愈必致癰膿水腫脉浮帶數即是虚寒潜止其間久必沉伏沉伏則陽虗隂實為水必矣要知水脉必沉是也論曰脉出者死與病不相應也諸唇黒則傷肝缺盆盈平則傷心臍出則傷脾足平則傷腎背平則傷肺此五者必不可療也治法云腰以上宜發汗腰以下利小便錢氏論虚實腹脹實則不因吐瀉久病之後亦不因下利脹而喘急悶亂更有痰有熱及有宿食不化而脹者宜服大黄丸白餅子紫霜丸下之更詳認大小便如俱不通先利小便後利大便虚則久病吐瀉後其脉㣲細肺主目胞腮虚腫手足冷當先服塌氣丸後服異功散及和中丸益黄散溫其氣因于氣腫者橘皮煎丸因于濕為腫煎防己黄耆湯調五苓散因于熱為腫者服八正散又一法燥熱於肺為腫者乃絶水之源也當清肺除燥水自生矣于䜴梔湯中加黄芩如熱在下焦隂消使氣不得化者當益隂則陽氣自化也黄蘖黄連是也五脉論五水灸法青水灸肝井赤水灸心榮黄水灸脾俞白水灸肺經黒水灸腎合婦人蠱脹無脉燒青丸五皮散亦是論諸蠱脹者有二腫若從胃則旦食而不能夜食旦則不脹夜則脹是也若水腫證濡泄者是也内經曰蠱脹之病治以雞屎醴酒調服水脹之病當開鬼門潔淨府也白茯苓湯名變水白茯苓澤瀉各二两郁李仁二錢右㕮咀作一服水一椀煎至一半常服無時從少至多服或煎得澄入生薑自然汁在内和麵或做粥飯作常食五七日後覺脹下再中以白术散白术澤瀉各半两右為細末煎服三錢茯苓湯調下或丸亦可服三十丸末治之藥服黄耆芍藥建中之類以調養之平復後忌房室猪魚塩麵等物治水氣蠱脹潔淨府楮實子丸楮實子一斗水二斗熬成膏子白丁香一两半茯苓三两去皮右二味為細末用楮實膏為丸如桐子大不計丸數從少至多服至小便清利及腹脹减為度後服中治藥末治藥調養藥踈啓其中忌甘苦酸補其下五補七宣取穴法治腫治其經治金火也井榮俞經隂經金也舎木水火陽經火也治腫木香散木香大㦸白牽牛各等分右為細末每用三錢猪腰子一對批開摻藥在内燒熟空心服之如左則塌左右則塌右如水腫不能全去於腹上塗甘遂末在遶臍滿腹少飲甘草水其腫便去也治水腫螻蛄去頭尾與葡萄心同研露七日曝乾為細末淡酒調下暑月濕用尤佳又方棗一斗鍋内入水上有四指用大㦸并根苗盖之遍盆合之煑熟為度去大㦸不用旋旋喫無時盡棗决愈神效眼目論第二十五論曰眼之為病在府則為表當除風散熱在藏則為裏宜養血安神暴發者為表而易治久病者在裏而難愈除風散熱者㵼青丸主之養血安神者定志丸婦人熟乾地黄丸是也或有體肥氣盛風熱上行目昏澁者槐子散主之此由胸中氣濁上行也重則為痰厥亦缺使胸中氣清無此病也又有因目疾過藥多而損缺入之眼漸昏弱乍明乍暗不欲視物此目少血之驗也熟乾地黄丸消風散定志丸相須而養之或有視物不明見黒花者此謂之腎氣弱也宜補腎水駐景丸是也或有暴失明者謂眼居諸陽交之會也而隂反閉之此風邪内滿當有不測之疾也翳膜者風熱重而有之或斑入眼此肝氣盛而發在表也翳膜已生在表明矣當發散而去之反踈利則邪氣内搐為翳則深也邪氣未定謂之熱翳而浮邪氣已定謂之氷翳而沉邪氣牢而深者謂之陷翳當以焮發之物使其邪氣再動翳膜乃浮輔之退翳之藥則能自去也病久者不能速效當以歳月除之治眼赤暴發腫散熱飲子防風羌活黄芩黄連各一两右剉每服半两水二盞煎至一盞食後温服如大便秘澁加大黄一两如痛甚者加當歸地黄如煩燥不能眠睡加梔子一两川芎散治風熱上衝頭目眩熱腫及胸中不利芎槐子各一两右細末三錢如胸中氣滯不利生薑湯調目疾茶調風熱上攻㕮咀一两水煎食後治眼久病昏澁因發而久不愈地黄湯防風羌活黄芩黄連地黄當歸人參茯神各等分右為麄末毎服五七錢水一盞半煎至一盞去滓溫服食後槐子散槐子黄芩木賊蒼术各等分右細末茶清調下食後治眼生翳膜及斑入眼焮赤已過者㵼青丸主之當半减大黄如大便秘焮氣未定依方服之治氷翳久不去者羚羊角散主之羚羊角升麻細辛各等分甘草半之右為細末一半為散一半蜜為丸如桐子大每服五七十丸以羚羊角散下之食後臨卧米泔水煎服治太陽經衛虚血實腫人臉重頭中濕淫膚脉睛痛肝風盛眼黒腎虚桔便丸桔梗一斤牽牛頭末三两右二味為末煉蜜丸如桐子大每服四五十丸加至百丸食前温水下日二服金絲膏㸃眼藥生薑四两取汁白沙蜜一斤煉去滓䝋猪膽汁三錢黄連四两槌用水一手浸煎取五升右先煎黄連水後入薑汁次入蜜同煎去沫淨次入下項藥末腦子四錢麝香三錢􅗠砂四錢鵬砂三錢輕粉五錢熊膽四錢青塩三錢右極細攪勻熬令稀膏㸃用治眼暴赤發嗔痛不可忍者救苦丸黄連一两當歸二錢甘草一錢右同剉細新水半椀浸一宿以慢火熬約至一半以綿濾去滓以淨為妙用火再熬作稠膏子為度攤在椀上倒合以物盖之用熟艾一大彈子許底下燃之用艾熏膏子艾盡為度再入下項藥朱砂一錢飛腦子半錢乳香没藥等分右同研極細入黄連膏内捜和丸如米大每用二丸㸃眼大角内仰面卧藥化則起治眼發赤腫毒氣侵睛脹痛宣毒散盆硝雄黄乳香没藥各等分右為極細末以少許鼻内㗜之治眼風毒發腫鼻中欲啑啑多大損而生瘡宣風散川芎甘菊各二錢乳香没藥各一錢右和勻再研極細少許鼻内㗜之目能逺視不能近視局方中定志丸目能近視不能逺視萬壽地芝丸生薑四两焙天門冬四两去心枳殻三两去穣炒甘菊二两右為細末煉蜜丸如桐子大茶清或温酒下一百丸食後此藥能愈大風熱洗眼藥呵子二两黄丹四两蜜八两栁枝四十寸右以河水二椀熬至半椀用一錢熱水化洗之石噐内熬治眼赤瞎以青埿蛆不論多少淘淨㬠乾末之令害眼人仰卧合目用藥一錢散在眼上須臾藥行待少時去藥赤瞎亦無治倒睫無名異末之摻捲在紙中作撚子㸃着到藥處吹殺以煙熏睫自起瘡瘍論第二十六論曰瘡瘍者火之属湏分内外以治其本内經曰膏粱之變足生大丁其原在裏發于表也受持如虚言内結而發諸外未知從何道而出皆是從虚而出也假令太陽經虚從背而出少陽經虚從鬢出陽明經虚從髭而出腎脉經虚從腦而出又經曰地之濕氣感則害人皮膚筋脉其在外盛則内行若其脉沉實當先踈其内以絶其原也其脉浮大當先托裏恐氣傷于内也有内外之中者邪氣至甚遏絶經絡故發癰腫經曰榮氣不從道于肉理乃生癰疽此因失托裏及失踈通又失和榮衞也治瘡之大要湏明托裏踈通行榮衞三法托裏者治其外之内踈通者治其内之外行榮衞者治其中也内之外者其脉沉實發熱煩躁外無焮赤痛其邪氣深於内也故先踈通以絶其原外之内者其脉浮數焮腫在外形證外顯恐邪氣極而内行故先托裏内外之中者外無焮惡之氣内亦藏府宣通知其在經當和榮衞也用此三法之後雖未差必無變證亦可使邪氣峻减而易痊愈故經曰諸痛痒瘡瘍皆属心火又曰知其要者一言而終不知其要流散無窮鍼灸法曰凡瘡瘍可灸刺者湏分經絡部分血氣多少俞穴逺近若從背而出當從太陽五穴隨證選用或刺或灸泄其邪氣缺凡太陽多血少氣至隂通谷束骨崑崙委中從鬢而出者當從少陽五穴選用少陽少血多氣竅隂夾谿臨泣陽輔陽陵泉從髭而出者當從陽明五穴選用陽明多血少氣厲兊内庭䧟谷衝陽解谿從腦而出者初覺腦痛不可忍且欲生瘡也腦者髓之海當灸刺絶骨以泄邪氣髓者舎也故脉浮者從太陽經依前選用脉長者從陽明經依前選用脉弦者從少陽經依前選用論曰諸經各有井榮俞經合井主心下滿及瘡色青榮主身熱及瘡赤色俞主體重節痛瘡黄色經主欬嗽寒熱瘡白色合主氣逆而泄瘡黒色隨經病而有此證者或宜灸宜鍼以泄邪氣經曰邪氣内搐則腫熱宜砭射之也内經曰夫癖氣之息者宜以鍼開除之氣勝血聚者宜石而泄之王注曰石砭也可以破大癰出膿今以排鍼代之凡瘡瘍已覺㣲謾腫硬皮血不變色脉沉不痛者當外灸之引邪氣出而方止如以有膿水者不可灸當刺之淺者亦不灸經曰陷者灸之如外㣲覺木硬而不痛者當急灸之是邪氣深陷也淺者不可灸慎之諸病瘡瘍如嘔者是濕氣侵于胃也藥中宜倍加白术服之内踈黄連湯治嘔啘心逆發熱而煩脉沉而實腫硬木悶而皮肉不變色根深大病在内藏府秘澁當急踈利之黄連芍藥當歸㯽榔木香黄芩山梔子薄荷桔梗甘草已上各一两連翹二两右除㯽榔木香二味為細末外並剉每服一两水一盞半煎至一盞先喫一二服次每服加大黄一錢再服加二錢以利為度如有熱證止服黄連湯大便秘澁加大黄覺無熱證少煎没藥内托復煎散時時服之如實無熱及大小便通止服復煎散稍有熱證却服黄連湯秘則加大黄如此内外皆通榮衞和調則經絡自不遏絶矣治腫焮于外根槃不深形證在表其脉多浮痛在皮肉邪氣盛則必侵于内急湏内托以救其裏也服内托復煎散地骨皮黄耆芍藥黄芩白术茯苓人參栁桂味淡者甘草防己當歸已上各一两防風二两右㕮咀先煎蒼术一斤用水五升煎至三升去术滓入前藥十二味再煎至三四盞絞取清汁作三四服終日服之又煎蒼术滓為湯去滓再依前煎服十二味滓此除濕散鬱熱使胃氣和平如或未己再作半料服之若大便秘及煩熱少服黄連湯如㣲利及煩熱已過却服復煎散半料如此使榮衞俱行邪氣不能内侵也治諸瘡瘍藏府已行如痛不可忍者可服當歸黄耆湯并加减在右當歸黄耆地黄地骨皮川芎芍藥等分右㕮咀每服一两水一椀煎至五分去滓温服如發熱者加黄芩煩熱不能卧者加梔子如嘔是濕氣侵胃也倍加白术膏藥方好芝蔴油半斤當歸半两杏仁四十九个去皮桃栁枝各四十九條長四指右用桃栁二大枝新綿一葉包藥繫於一枝上内油中外一枝攪於鐵器内煎成入黄丹三两一處熬水中滴成不散如珠子為度治金絲瘡一云紅絲瘤其狀如線或如繩巨細不等經所謂丹毒是也但比煙毒不甚廣闊人患此疾頭手有之下行至心則死下有之上行亦然法當於瘡頭截經而刺之以出血後嚼萍草根塗之立愈治從高堕下涎潮昏冒此驚恐得也苦杖散苦杖不以多少右細末熱酒調下如產後瘀血不散或聚血皆治之治丁瘡奪命散烏頭尖附子底蝎梢雄黄各一錢蜈蚣一對硵砂粉霜輕粉麝香乳香各半錢信二錢半腦子少許右為細末先破瘡出惡血畢以草杖頭用紙帶入于内以深為妙治瘡難消不能作膿痛不止木香散地骨皮一两去土皮木香半两穿山甲二錢半炙黄麝香一字右為細末酒調下三錢及小児斑後生癰米飲調下效如神治丁瘡毒氣入腹昏悶不食紫花地丁蟬殻管仲各半两丁香乳香各一錢右細末每服二錢温酒調下治惡瘡有死肉者及追膿白丁香輕粉粉霜雄黄麝香各一錢巴豆三个去油右同研細新飯和作錠子用之治諸瘡大疼痛不變肉色謾腫光色名曰附骨癰如神三生散露蜂房蛇退皮頭髪洗淨等分三味燒灰存性研細酒調三錢治膀胱移熱于小腸上為口糜好飲酒人多有此疾當用𨗳赤散五苓散各半两煎服治少隂口瘡半夏散若聲絶不出者是風寒遏絶陽氣不伸也半夏一两製桂一字草烏頭一字右同煎一盞水分作二服其效如神治太隂口瘡甘礬散生甘草一寸白礬一栗子大右噙化嚥津治赤口瘡乳香散乳香没藥各一錢白礬飛半錢銅緑少許為細末摻用治白口瘡没藥散没藥乳香雄黄各一錢輕粉半錢巴豆霜少許右細末乾摻瘰􅊓論第二十七夫瘰􅊓者經所謂結核是也或在耳前後連及頥頷下連缺盆皆為瘰􅊓或在胸及胸之側下連两脇皆為馬刀手足少陽主之此經多氣少血故多堅而少軟膿白而稀如泔水狀治者求水清可也如瘰􅊓生去别經臨時於銅人内隨其所屬經絡部分對證之穴灸之并依經内藥用之獨形而小者為結核續數連結者為瘰􅊓形表如蛤者為馬刀治馬刀連翹湯連翹二斤􅜰麥一斤大黄三两甘草二两右㕮咀一两水两椀煎至一盞半早食後巳時服在項两邊是屬少陽經服藥十餘日後可於臨泣穴灸二七壯服藥不可住了至六十日决效有一方加大黄不用甘草更加貝毋五两雄黄七分㯽榔半两同未熱水調下三五錢治瘰􅊓文武膏桑椹也文武實二斗黒熟者右以布袋取汁銀石器中熬成薄膏白湯㸃一匙日三服痔疾論第二十八論曰手陽明大腸名曰害蜚蜚蟲也六元正紀論陽明又曰司殺府手陽明屬金大腸名害蜚謂金能害五蟲又曰司殺府謂金主殺既有此二名何以自生蟲盖謂三焦相火盛而能制陽明金故木来相侮内經曰侮謂勝已也木主生五蟲叔和云氣主生于脾藏傍大腸疼痛陣難當漸覺少瀉三焦熱莫謾多方立紀綱此言飲酒多食熱物脾生大熱而助三焦氣盛火能生土也當㵼三焦火熱退使金得氣而反制木木受制則五蟲不生病自愈矣蒼术澤瀉丸蒼术四两去皮澤㵼二两枳實二两地榆二两皂子二两燒存性右為細末燒飯為丸桐子大每服三十丸食前酒或未飲下又方川烏炮古石灰等分依前丸服淋洗藥天仙子荆芥小椒蔓荆子等分右以水煎洗黒地黄丸治痔之聖藥也在虚損門下有方婦人胎産論第二十九論曰婦人童幼天癸未行之間皆屬少隂天癸既行皆從厥隂論之天癸巳絶乃屬太隂經也治胎產之病從厥隂經者是祖生化之源也厥隂與少陽相為表裏故治法無犯胃氣及上二焦為三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脉數而已動于脾利小便則内亡津液胃中枯燥製藥之法能不犯三禁則榮衞自和榮衞和而寒熱止矣外則和于榮衞内則調于清便先將此法為之初治次後詳而論之見證消息同壊證傷寒為之緩治或小便不利或大便秘結或積熱於腸胃之間或以成瘻或散血氣而為浮腫盖產理多門故同傷寒壊證如發渇而白虎氣弱則黄耆血刺痛而用以當歸腹中痛而加之芍藥已上例證不犯三禁皆產後之乆病也凡產後暴病禁犯不可拘也如產後熱入血室者桃仁承氣抵當湯之類是也胃堅燥者大承氣不可以世藥言之產後世人多用烏金四物是不知四時之寒熱不明血氣之虚與實盲然一槩用藥如此而愈加増劇是醫人誤之耳大抵產病天行從増損柴胡雜證從加添四物然春夏雖從柴胡秋冬約同四物藥性寒熱病證虚實不可不察也四物湯常病服餌四時各有増損今具増損于后春倍川芎一曰春二曰脉弦三曰頭痛夏倍芍藥一曰夏二曰脉洪三曰泄秋倍地黄一曰秋二曰脉嗇三曰血虚冬倍當歸一曰冬二曰脉沉三曰寒而不食此常服順四時之氣而有對證不愈者謂失其輔也春防風四物加防風倍川芎夏黄芩四物加黄芩倍芍藥秋天門冬四物加天門冬倍地黄冬桂枝四物加桂枝倍當歸此四時常服隨證用之也如血虚而腹痛㣲汗而惡風四物加荗桂謂之腹痛六合如風虚眩運加秦芁羌活謂之風六合如氣虚弱起則無力匡然而倒加厚朴陳皮謂之氣六合如發熱而煩不能安卧者加黄連梔子謂之熱六合如虚寒脉㣲氣難布息不渇清便自調加乾薑附子謂之寒六合如中濕身沉重無力身凉微汗加白术茯苓謂之濕六合此婦人常病及產後病通用之藥也治婦人虚勞局方中謂之首尾六合者如大聖散下熟乾地黄丸是治無熱虛勞專其養也中道藥牡丹煎丸空心食前人參荆芥散臨卧食後是治有熱虛勞藥也治婦人懐胎腹脹枳殻湯枳殻三两炒黄芩一两右為麄末每服半两水一盞半煎一盞去滓温服治産前脹滿身體沉重枳殻湯中加白术一两治產前寒熱小柴胡湯中去半夏謂之黄龍湯治懐孕胎漏二黄散生地黄熟地黄各等分右為細末加白术枳殻湯調下一两日二服治有孕胎痛地黄當歸湯當歸一两熟地黄二两右為麄末作一服水三升煎至升半去滓頓服束胎丸白术枳殻去穰炒等分右為末燒飯為丸如桐子大入月一日食前服三五十丸温熟水下胎瘦易生也服至產則已產間藥治胎衣不下或子死腹中或血衝上昏悶或暴血下及胞乾而不能産者宜服半夏湯半夏麴一两半桂七錢半去皮大黄五錢桃仁三十箇去皮尖炒右為細末先服四物湯三两服次服半夏湯三錢生薑三片水一盞煎去三分食後如未效次服下胎丸下胎丸半夏生白歛各半两右為細末滴水為丸如桐子大食後用半夏湯下三二丸續續加至五七丸如有未效者湏廣大其藥榆白皮散主之又不效大聖散