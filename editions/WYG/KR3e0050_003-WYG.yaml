藥調治之治婦人血積増損四物湯四物内加廣茂京三稜桂乾漆皆依法製各加一兩如四物煎服治婦人產後血昏血崩月事不調逺年乾血氣皆治之名曰紅花散乾荷葉牡丹皮當歸紅花蒲黄炒右各等分為細末每服半兩酒煎和滓溫服如衣不下另末榆白皮煎湯調半兩立效治婦人惡物不下當歸炒芫花炒右細末酒調三錢又好墨醋碎末之小便酒調下妙又治胎衣不下蛇退皮炒焦細末二錢酒調下諸見血無寒衂血下血吐血溺血皆屬于熱但血家證皆宜服此藥生地黄散生地黄熟地黄枸杞子地骨皮天門冬黄耆芍藥甘草黄芩右各等分同剉每服一兩水一盞半煎至一盞去滓溫服脉微身凉惡風毎一兩加桂半錢吐血者多有此證治衂血不止麥門冬飲子麥門冬生地黄右等分剉每服一兩煎服又衂血先硃砂蛤粉次木香黄連大便結下之大黄芒硝甘草生地黄溏軟梔子黄芩黄連可選用帶下論附論曰赤者熱入小腸白者熱入大腸原其本也皆濕熱結于脉故津液湧溢是為赤白帶下本不病縁五脉經虚結熱屈滯于帶故女子臍下㾓痛而綿綿隂器中時下也故經曰任脉為病男子内結七疝女子帶下瘕聚王注曰任脉自胞上過帶脉貫於臍上故男子内結七疝女子帶下帶脉起于季脇章門如束帶狀令濕熱寃結不散故為病也經曰脾傳之腎病名曰瘕疝小腹寃熱而痛出白一名曰蠱所以為帶下寃屈也寃結也屈滯而病熱不散先以十棗湯下之後服苦練丸大𤣥胡散調下之熱去濕除病自愈也如女子不月先瀉心火血自下也内經曰二陽之病發心脾有不得隠曲故女子不月其傳為風消王注曰大腸胃發病也心脾受之心主血心病則血不流脾主味脾病則味不化味不化則精不足精血不足故其證不能已虧則風邪勝而真氣愈消也又經曰月事不来者胞脉閉也胞脉屬於心而絡於胞中令氣上迫肺氣不得上通故月事不來先服降心火之劑後服局方中五補丸後以衞生湯治脾養血氣也苦練丸治婦人赤白帶下苦練碎酒浸茴香炒當歸右等分為細末酒糊丸如桐子大每服三五十丸空心酒下腰腿痛疼四物四兩加羌活防風各一兩衞生湯當歸白芍藥各二兩黄耆三兩甘草一兩右為麄末每服半兩水二盞煎至一盞去滓温服空心如虚者加人參一兩大頭論第三十夫大頭病者是陽明邪熱太甚資實少陽相火而為之也多在少陽或在陽明或傳太陽視其腫勢在何部分隨經取之濕熱為腫木盛為痛此邪見於頭多在兩耳前後先出皆主其病也治之大不宜藥速速則過其病所謂上熱未除中寒復生必傷人命此病是自外而之内者是血病况頭部分受邪見于無邪迹之部當先緩而後急先緩者謂邪氣在上著無形之分部既著無形無所不至若用重劑速下過其病難已雖用緩藥若急服之或食前或頓服皆失緩體則藥不能得除病當徐徐浸漬無形之邪也或藥性味形體擬象皆要不離緩體是也且後急者謂緩劑已瀉邪氣入於中是到隂部染於有形質之所若不速去則損隂也此終治却為客邪當急去之是治客以急也且治主當緩者謂陽邪在上隂邪在下各本家病也若急治之不能解紛而益亂也此故主主當緩治客以急者謂陽分受隂邪隂分受陽邪此客氣急除去之也假令少陽陽明為病少陽為邪出于耳之前後也陽明為邪者首大腫是也先以黄芩黄連甘草湯通炒過剉煎少少不住服或劑畢再用大黄煨鼠粘子新瓦上炒香煎藥成去滓内芒硝俱各等分亦時時呷之無令飲食在前得㣲利及邪氣已只服前藥如不已再同前次第服之取大便利邪氣即止如陽明渇者加石膏如少陽渇者加𤓰蔞根陽明行經升麻芍藥葛根甘草太陽行經羌活防風之類雷頭風附夫治雷頭者諸藥不效為與證不相對也夫雷頭者震卦主之震仰盂故予製藥内加荷葉謂象其震之形其色又青乃述類象形也當煎局方中升麻湯升麻湯一兩蒼术一兩荷葉一箇全者右為細末每服五錢水一盞煎七分温服食後或燒全荷葉一箇研細調煎藥服亦妙耳論附論曰耳者盖非一也以竅言之是水也以聲言之金也以經言之手足少陽俱㑹其中也有從内不能聽者主也有從外不能入者經也有若蟬鳴者有若鐘聲者有若火熇熇狀者各隨經見之其間虚實不可不察也假令耳聾者腎也何謂治肺肺主聲鼻塞者肺也何謂治心心主臭如推此法皆從受氣為始腎受氣於己心受氣於亥肝受氣於甲肺受氣於寅脾正四季此法皆長生之道也小兒斑疹論第三十一論曰斑疹之病其狀各異瘡發焮腫于外屬少陽三焦相火謂之斑小紅壓行於皮膚之中不出者屬少隂君火也謂之疹凡顯斑證者若自吐瀉者慎勿治則多吉謂邪氣上下皆出也大凡瘡疹首尾皆不可下恐妄動而生變此謂少陽通表宜和之也當先安其裏以解毒次㣲發之安裏解毒者謂能安和五藏防風湯是也如大便不秘次㣲發之㣲發之藥錢氏中甚多宜選用之如大便過秘宜㣲利之當歸丸棗變百祥丸是也初知是斑疹若便發之令斑併出小兒難禁是使别生他證也首尾不可下者首曰上焦尾曰下焦若已吐利不可下也便宜安裏藥三五服如能食大便秘者内實宜㣲踈利之若内虚而利者宜安裏藥三五服末後一服調㣲發之藥服之大抵用安裏之藥多發表之藥少秘則㣲踈之邪氣不併出能作番次使小兒易禁也身温者順身凉者逆則宜服防風湯以和之防風湯防風一兩地骨皮黄耆芍藥枳殻荆芥穂牛旁子已上各半兩右為細末温水調下或為麄末煎服二三錢更妙治大便秘而内實能食宜當歸丸當歸五錢黄連二錢半大黄二錢甘草一錢炙先將當歸熬作膏子入藥三味為丸漸次服十丸治斑疹大便秘結棗變百祥丸大㦸去骨一两棗三箇去核右二味用水一椀煎至水盡為度去大㦸不用將棗焙乾可和劑旋丸從少至多以利為度五臟病各有所見證熱則從心寒則從腎嗽而氣上則從肺風從肝瀉從脾假令㵼見嗽而氣上脾肺病也瀉白益黄散合而服之又宜黄芩厚朴湯白术厚朴湯謂脾苦濕肺苦燥氣則上逆也其證先瀉又兼面色黄腸鳴呦呦者是也如見渇熱多者當服厚朴湯下渇熱少者當服白术厚朴湯其他五臟若有兼證皆如此類然更詳後説四時經移用藥假令春分前風寒也宜用地黄羌活防風或地黄丸及瀉青相間服之春分後風熱也宜用羌活防風黄芩或㵼青丸用𨗳赤散下之立夏之後熱也用三黄丸𨗳赤散夏至後濕熱也宜𨗳赤㵼黄丸合而服之或黄芩甘草白术茯苓之類為勝濕之藥立秋後宜用益黄散㵼白散陳皮厚朴人參木香之類秋分後用㵼白散立冬之後地黄丸主之謂腎不受㵼也大凡小兒斑疹己發有瘡有聲音者乃形病氣不病也無瘡無聲音者乃氣病形不病也有瘡而無聲音者是形氣俱病也後一證當清利肺氣八風湯或凉鬲散大黄芒硝亦可或如聖湯加大黄或八味羌活湯加大黄此是春時發斑謂之風斑耳瘡疹者内經云痛痒瘡瘍皆屬心火斑子者是相君行命三焦真陽氣之所作也若氣入肺變膿胞入肝為水胞自病為斑心乃君火入於皮作癮疹為肺主皮毛心不害肺金此乃君之德也未瘡而發搐而外感寒邪内發心熱而發搐用茶粉下解毒丸或犀角地黄湯主之已發便稠宻形勢如針頭者當輕發其表凉其内連翹升麻湯主之若斑已發稠宻甚而㣲喘飲水有熱證當以去風藥㣲下之若出不快清便自調知為在表不在裏當㣲發之升麻葛根湯主之若有乾黒陷身不大熱大小便澁則知熱在内當煎大黄湯下宣風散身表大熱者表證未罷不可利大便若斑疹已出見小熱小便不利者當利小便已發後有毒餘不散為復有身熱癰瘡之類當用解毒之藥藥畧第三十二針法附羌活治支節痛太隂經風藥也防風療風通用甘草和中調諸藥肉桂通氣助膓桂枝閉汗和表麻黄發大陽隂經汗桃仁滋血破血黄芩瀉肝氣雄黄去風白芷治正陽明頭痛知毋泄腎火助隂石膏㵼肺火是陽明大凉藥半夏去痰柴胡治少陽厥陰寒熱徃來芍藥止脾痛安太隂人參補氣和中𤓰蒂治濕在上頭吐藥赤豆利小便杏仁潤肺除燥蒼术温中去濕熱强胃草烏頭熱行經南星治風痰湏用天麻治頭風神麴消食强胃白术蒼术同陳皮益氣枳實治心下痞枳殻利胸中氣消痞黄連泄心火白茯苓止渇利小便太隂經藥苦葶藶瀉肺火桔梗治嚥喉痛利肺氣大黄泄實熱厚朴治脹滿厚腸黄耆止汗治諸氣虚不足㯽榔破氣不行荆芥清利頭目烏梅肉助脾收胃飲食沉香益氣和神肉豆蔲治大腸腸滑附子補命及心火朴硝寒减去燥梔子除煩利氣行小便當歸補三隂血不足川芎太陽頭痛地黄補腎真陰不足臍下痛萆薢補腎不足杜仲壯筋骨兩全牛膝補筋益脾蓯蓉益陽道及命門火衰沙苑蒺䔧補腎水真隂破故紙補命門不足五味子補五臟氣不足巴豆去濕之過藥細辛少隂頭痛不足升麻陽明經和觧藥蛇蛻去皮膚風燥茴香利小便補腎去沉寒助陽苦練子去小腹痛廣茂去積聚乾薑益氣和中生地黄凉血沒藥除血痛和血之勝藥也地榆治下部有血澤㵼治少隂不渇而小便不利及膀胱中有留輕枯虚薄緩淺假宜上厚重實潤深真急宜下其中平者宜中餘形色性味皆隨藏腑所宜此處方用藥之大槩耳知者誠用心則思過半矣流注鍼法心缺脉沉腎經原穴弦肝經原穴澁肺經原穴缺肝經原穴緩脾經原穴缺身之前足陽明原穴衝陽身之後足太陽原穴京骨身之側足少陽原穴丘墟針之最要兩脇痛針少陽經丘墟心痛針少隂經太谿湧泉及足厥隂原穴腰疹不可忍針崑崙及刺委中出血太陽喘滿痰實口中如膠針太谿穴噦嘔無度針手厥隂太陵穴頭痛不可忍針足厥隂太陽經原穴熱無度不可止刺陷骨穴出血骨熱不可治前板齒乾燥當灸骨㑹大推小腸疝痛當刺足厥隂肝經大衝穴血不止鼻衂大小便皆血血崩當刺足太隂井隱白喉閉刺少陽手足井并刺少啇及足太隂井火煩熱晝夜不息刺十指間出血謂之八關大刺目疾睛痛欲出亦大刺八闗百節疼痛實無所知三稜針刺絶骨出血眼大􅗃痛刺手太陽井穴少澤小􅗃痛刺少陽井穴闗衝隂頭中痛不可忍者卒疝也婦人隂中痛皆刺足厥隂井大敦穴保命集卷下
