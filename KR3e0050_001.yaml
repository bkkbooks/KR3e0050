body:
  text: 保命集卷上金張元素撰原道第一經曰觀天之道執天之行盡矣盖天一而地二北辨而南交入精神之運以行矣擬之於象則水火也畫之於卦則坎離也兩者相須彌滿六合物物得之况於人乎盖精神生於道者也是以上古真人把握萬象仰觀日月呼吸元氣運氣流精脱骨換形執天機而行六氣分地紀而運五行食乳飲血省約儉育日夜流光獨立守神肌肉若一故能夀比天地無有終時此其道生之要也夫道者能却老而全形身安而無疾夫水火用法象也坎離交言變也萬億之書故以水為命以火為性土為人人為主性命者也是以主性命者在乎人去性命者亦在乎人何則脩短夀夭皆自人為故經曰精神内守病安從來又曰務快其心逆於生樂所以然者性命在乎人故人受天地之氣以化生性命也是知形者生之舎也氣者生之元也神者生之制也形以氣充氣耗形病神依氣位氣納神存修真之士法於隂陽和於術數持滿御神專氣抱一以神為車以氣為馬神氣相合可以長生故曰精有主氣有元呼吸元氣合於自然此之謂也智者明乎此理吹嘘呼吸吐故納新熊經鳥伸導引按蹻所以調其氣也平氣定息握固凝想神宫内視五臟昭徹所以守其氣也法則天地順理隂陽交媾坎離濟用水火所以交其氣也神水華池含虚皷漱通行榮衞入於元宫溉五臟也服氣於朝閉息於暮陽不欲迭隂不欲覆鍊隂陽也以至起居適早晏出處協時令忍怒以全隂抑喜以全陽泥丸欲多櫛天皷欲常鳴形欲常鑑津欲常咽體欲常運食欲常少眼者身之鑑也常居欲頻修耳者體之牖也城郭欲頻治面者神之庭也神不欲覆髪者腦之華也腦不欲減體者精之元也精不欲竭眀者身之寳也眀不欲耗補㵼六腑陶鍊五精可以固形可以全生此皆修真之要道也故修真之要者水火欲其相濟土金欲其相養是以全生之術形氣貴乎安安則有倫而不亂精身貴乎保保則有要而不耗故保而養之初不離於形氣精神及其至也可以通神明之出神明之出皆在於心獨不觀心為君主之官得所養則血脈之氣王而不衰生之本無得而摇也神之變無得而測也腎為作強之官得所養則骨髓之氣榮而不枯蟄封藏之本無得而傾也精之處無得而奪也夫一身之間心居而守正腎下而立始精神之居此宫不可太勞亦不可太竭故精太勞則竭其屬在腎可以專嗇之也神太用則勞其藏在心靜以養之唯靜專然後可以内守故昧者不知於此欲拂自然之理謬為求補之術是以偽勝真以人助天其可得乎原脈第二道之渾淪莫知其源然至道無言非立言無以眀其理大象無形非立象無以測其奥道象之妙非言不明嘗試原之脈者何也非氣非血動而不息榮行脈中衞行脈外經曰脈者血之府也自素問而下迄至於今經所不載無傳記而莫聞其名焉然而𤣥機奥妙聖意幽微雖英俊明哲之士非輕易可得而悟也夫脈者果何物乎脈者有三名一曰命之本二曰氣之神三曰形之道經所謂天和者是也至於折一支瞽二目亦不為害生而脈不可須臾失失則絶命害生矣經曰春弦一曰長夏洪一口鈎秋毛一曰濇冬石一曰沉此言正脈同天真造化之元氣也廵於春夏秋冬木火金水之位生長收藏叅和相應故稟二儀而生不離於氣故脈有生死之驗經曰脈者血之腑也如世之京都州縣有公府廨署也國因置者所以禁小人為非道也公府不立則善者無以伸其枉惡者無以罰其罪邪正混同賢愚雜處而亂之根也經曰五運隂陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也既隂陽為神明之府脈為血之府而明可見焉血之無脈不得循其經絡部分周流於身滂流奔廹或散或聚氣之無脈不能行其筋骨臓腑上下或暴或蹶故經曰出入廢則神機化滅升降息則氣立孤危故氣化則物生氣變則物易氣盛則物壯氣弱則物衰氣絶則物死氣正則物和氣亂則物病皆隨氣之盛衰而為變化也脈字者從肉從永從􅏨從血四肢百骸得此真元之氣血肉筋骨𤓰髮榮茂可以倚憑而能生長也長久永固之道故從肉從水者是也從􅏨從血者廵之如水分流而布遍周身無所不通也釋名曰脈幕也如幔幕之遮覆也幕絡一體之形導太一真元之氣也元氣者在氣非寒非熱非暖非凉在脈者非長非鈎非濇非沉不為氣而浮沉不為血而流停乃沖和自然之氣也故春溫夏熱秋涼冬寒所以然者為元氣動而不息廵於四方木火金水之位溫凉寒暑之化生生相續新新不停日月更出四序迭遷脈不為息故人有身形之後五藏既生身中元氣即生焉故春弦夏洪秋毛冬石此四時之氣也而脈者乃在其中矣道德經曰視之不見聴之不聞搏之不得迎之不見其首隨之不見其後此如脈之謂也又云埏埴以為器當其無有器之用故有之以為利無之以為用又曰吾不知其名字之曰道強為之名曰大斯立脈之名之本意也故道者萬物之奥脈者百骸之靈奥靈之妙其道乃同元氣者無器不有無所不至血因此而行氣因此而生故榮行脈中衞行脈外瞻之在前忽焉在後而不匱者皆由於脈也分而言之曰氣曰血曰脈統而言之惟脈運行血氣而已故經曰血氣者人之神不可不謹養也隂陽别論曰所謂陽者胃脘之陽也此陽者言脈也胃者土也脈乃天真造化之元氣也若土無氣何以生長收藏若氣無土何以養化萬物是無生滅也以平人之氣常稟於胃正理論曰穀入於胃脈道乃生隂陽交㑹胃和脈行人稟天地之候故春胃微弦曰平但弦而無胃曰死夏胃微鈎曰平但鈎而無胃曰死長夏微耎曰平但弱而無胃曰死秋胃微毛曰平但毛而無胃曰死冬胃微石曰平但石而無胃曰死隂者真藏也見則為敗敗則必死五藏為隂肝脈至中而無外急如循刀刃責責然如按琴絃心脈至堅而摶如循薏苡仁累累然肺脈至大而虚如毛羽中人皮膚腎脈至摶而絶如以指彈石辟辟然脾脈弱而乍數乍踈夫如此脈者皆為藏脈而獨見而無胃脈五藏皆至懸絶而死故經曰别於陽者知病忌時别於隂者知生死之期故人性候躁急懁促遲緩耎弱長短大小皮堅肉厚各隨其狀而脈應之常以一息四至為準者言呼出心與肺吸入腎與肝五者胃兼主四旁在呼吸之間也數則為熱遲則為寒如天之春秋二分隂陽兩停晝夜各得五十度自此添一遭則熱減一遭則寒脈之妙道從此可知矣或如散葉或如然薪或如丸泥或如絲縷或如湧泉或如土頽或如偃刀或如轉索或如遊魚假使千變萬化若失常者乃真元之氣離絶五臓六腑不相管轄如喪家之狗元氣散失而命絶矣經曰積陽為天積隂為地陽化氣隂成形此言一氣判而清濁分也元氣者天地之本天和者血氣之根華陀云脈者謂血氣之先也孔子曰天不言而四時行焉百物生焉而脈亦如之又經曰自古通天者生之本皆通乎天氣也通天者謂通元氣天真也然形體者假天地之氣而生故奉生之氣通計於天稟受隂陽而為根本天地合氣命之曰人天氣不絶真靈内屬動靜變化悉與天通易云乾坤成列而易立乎其中矣故天地之體得易而後生天地之化得易而後成故陽用事則春生夏長隂用事則秋收冬藏寒往則暑來暑往則寒來始而終之終而復始天地之化也而易也黙然於其間而使其四序各因時而成功至於寒不陵暑暑不奪寒無愆陽伏隂之變而不至於大肅大温故萬物各得其沖氣之和然後不為過而皆中節也道徳經曰萬物負隂而抱陽沖氣以為和百姓日用而不知斯脈之道也故脈不得獨浮沉獨大小獨盛衰獨隂陽須可沉中有浮浮中有沉大中有小小中有大盛中有衰衰中有盛隂中有陽陽中有隂充塞一身之中盈溢百骸之内無經絡不有無氣血不至養筋骨毛髪堅壯膩澤非心非腎非肝非脾五藏之盛真氣固密不為邪傷若憂愁思慮飢飽勞逸風雨寒暑大驚卒恐真氣耗亂血氣分離為病之本噫夫萬物之中五常皆備審脈之道而何獨無五常備邪夫仁固衞一身充盈五藏四肢百骸皆得榮養無沖和之氣獨真藏脈見則死矣生則不見死則脈見好生惡死此仁之謂也分布軀體和調氣血貴之在頭目耳鼻賤之在蹠臋隂纂不得上而有不得下而無無所不施無所不至此義之謂也長人脈長短人脈短肥人脈沉瘦人脈浮大人脈壯小人脈弱若長人短短人長肥人浮瘦人沉大人弱小人壯夫如此者皆不中理而為病此禮之謂也見在寸則上病見在闗則中病見在尺則下病五藏有疾各有部分而脈出見不為潜藏伏匿一一得察有餘不足而愈其病此智之謂也春弦夏洪秋毛冬石太陽之至其脈沉太隂之至其脈大而長少隂之至其脈鈎陽明之至其脈濇而短少陽之至其脈浮厥隂之至其脈弦四序不失其期六氣為常準者此信之謂也非探賾索隠鈎深致逺學貫天人旁通物理者未能達於此矣攝生論第三論曰内經謂法於隂陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百嵗乃去今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也且飲食起居乃人生日用之法縱恣不能知節而欲傳精神服天氣者不亦難乎又經曰飲食自倍腸胃乃傷起居如驚神氣乃浮是以聖人春木旺以膏香助脾夏火旺以膏臊助肺金用事膳膏腥以助肝水用事膳膏膻以助心所謂因其不勝而助之也故食飲之常保其生之要者五穀五果五畜五菜也脾胃待此而倉廩備三焦待此而道路通榮衞待此以清以濁筋骨待此以柔以正故經云盖五味相濟斯無五宫之傷所以養其形也雖五味為之養形若味過於酸肝氣以津脾氣乃絶味過於醎大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衝味過於苦脾氣不濡胃氣乃厚味過於辛筋骨沮弛精神乃失所謂失五味之常而損其形也王注曰味有倫緣臟有偏絶此之謂也飲食者養其形起居者調其神是以聖人春三月夜卧早起被髮緩形見於發生之時且曰以使志生夏三月夜卧早起無厭於日見於蕃秀之時且曰使志無怒使氣得泄秋三月早卧早起與鷄俱興見於容平之時收斂神氣且曰使志安寧以應秋氣冬三月早卧晩起去寒就溫見於閉藏之時且曰使志若伏若匿若有私意若已有得此順生長收藏之道春夏養陽秋冬養隂順四時起居法所以調其神也經所謂逆於春氣則少陽不生肝氣内變逆於夏氣則太陽不長心氣内涸逆於秋氣則太隂不收肺氣焦滿逆於冬氣則少隂不藏腎氣獨沉此失四時之氣所以傷其神也智者順四時不逆隂陽之道而不失五味損益之理故形與神俱久矣乃盡其天年而去與夫務快其心逆於生樂者何足與語此道哉故聖人行之賢者佩之豈虚語哉隂陽論第四論曰天地者隂陽之本也隂陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也故隂陽不測謂之神神用無方謂之聖儻不如此以為天自運乎地自處乎豈足以語造化之全功哉大哉乾元萬物資始至哉坤元萬物資生所以天為陽地為隂水為隂火為陽隂陽者男女之血氣水火者隂陽之徴兆惟水火既濟血氣變革然後剛柔有體而形質立焉經所謂天覆地載萬物悉備莫貴於人人禀天地之氣生四時之法成故人生於地懸命於天人生有形不離隂陽盖人居天之下地之上氣交之中不明隂陽而望延年未之有也何則蒼天之氣不得無常也氣之不襲是謂非常非常則變矣王注曰且蒼天布氣尚不越於五行人在氣中豈不應於天道左傳曰違天不祥繫辭云一隂一陽之謂道老子曰萬物負隂而抱陽故偏隂陽謂之疾夫言一身之中外為陽内為隂氣為陽血為隂背為陽腹為隂府為陽藏為隂肝心脾肺腎五藏皆為隂膽胃大小腸膀胱三焦六府皆為陽盖陽中有隂隂中有陽豈偏枯而為道哉經所謂治心病必求其本者是明隂陽之大體水火之髙下盛衰之補㵼逺近之大小隂陽之變通夫如是唯達道人可知也察色論第五論曰聲合五音色合五行聲色符同然後定立藏府之榮枯若滋榮者其氣生如翠羽鷄冠蟹腹豕膏烏羽是也枯夭者其氣敗如草兹衅血枳實枯骨如炲是也至如青赤見於春赤黄見於夏黃白見於長夏白黒見於秋黑青見於冬是謂五藏之生者以五行之相繼也得肝脈色見青白心脈色見赤黒脾脈色見黄青肺脈色見白赤腎脈色見黑黄是謂真藏之見者以五行之相尅也若乃肺風而眉白心風而口赤肝風而目青脾風而鼻黃腎風而肌黒以風善行數變故爾肝熱而左頰赤肺熱而右頰赤心熱而顔赤脾熱而鼻赤腎熱而頥赤以諸熱皆屬火故爾以至青黑為痛黄白為熱青白為寒以九氣不同故爾鼻青為腹水黑為水氣白為無血黄為胃寒赤為有風鮮明為留飲而五色取決於此故爾然審病者又皆以貞脾為本盖貞脾之黃是謂天之氣五色又明病雖久而面黃必生者以其真氣外榮也此數者雖皆成法然自非心清見曉於冥冥不能至於此故五色微診可以目察尤難難經曰望而知之謂之神為見五色於外故決死生也傷寒論第六論曰夫熱病者皆傷寒之類也或愈或死止於六七日間若兩感於寒者必不免於死經所謂人之傷於寒者則為病熱熱雖甚不死盖傷寒者非雜病所比非仲景孰能明此故張先公深得𤣥機之理趣達六經之標本知汗下之淺深若投湯劑正與不正禍福影響何暇數日哉然仲景分三百九十七法一百一十三方其證有六其治有四經云一日巨陽受之其脈尺寸俱浮二日陽明受之其脈尺寸俱長三日少陽受之其脈尺寸俱弦至四日太隂受之其脈尺寸俱沉細五日少隂受之其脈尺寸俱微緩六日厥隂受之其脈尺寸俱沉濇其太陽病者標本不同標熱本寒從標太陽發熱從本則膀胱惡寒若頭項痛腰脊強太陽經病也故宜發汗其陽明病者雖從中氣標陽本實從標則肌實從本則讝語若身熱目痛鼻乾不得卧陽明經病故宜解肌太陽傳陽明非表裏之傳若讝語從本為實故宜下便王注曰以陽感熱其少陽病者標陽本火從標則發熱從本則惡寒前有陽明後有太隂若胷脇痛而耳聾往來寒熱少陽經病故宜和解其太隂病者標隂本温從標則身目黄從本則腹脹滿若腹滿而嗌乾太隂經病故宜泄滿下濕從其本治其少隂病者標隂本熱從標則爪甲青而身冷從本則脈沈實而發渴若口燥舌乾而渴少隂經病故宜温標下本其厥隂病者故厥隂之中氣宜温也若煩滿囊縮厥隂經病故為熱宜苦辛下之故經所謂知標知本萬舉萬當不知標本是謂妄行又曰各通其藏乃懼汗泄非宜此之謂也故明斯六經之標本乃為治傷寒之規矩此所謂證有六也且如發汗桂枝麻黃之輩在皮者汗而發之葛根升麻之輩因其輕而揚之法也承氣陷胷之輩下者引而竭之法也㵼心十棗之輩中滿泄之法也𤓰蒂梔䜴者髙者因而越之法也故明此四治之輕重可為了傷寒之繩墨此之謂其治有四也若明六經四法豈有發黃生斑畜血之壞證結胷痞氣之藥過難經所謂未滿三日可汗而已其滿三日可泄而已故仲景曰太陽病脈浮𦂳無汗身疼痛八九日不解表證仍在當發其汗宜麻黄湯主之少隂病得之三二日口燥咽乾者急宜大承氣湯下之孰敢執於三四日汗泄之定法也是以聖人書不盡言言不盡意説其大槩此之謂也經所謂發表不逺熱攻裏不逺寒余自製雙解通聖辛凉之劑不遵仲景法桂枝麻黃發表之藥非余自衒理在其中矣故此一時彼一時奈五運六氣有所更世態居民有所變天以常火人以常動動則屬陽靜則屬隂内外皆擾故不可峻用辛温大熱之劑縱獲一效其禍數作豈曉辛凉之劑以葱白鹽豉大能開發欝結不惟中病令汗而愈免致辛熱之藥攻表不中其病轉甚發驚狂衂血斑出皆屬熱藥所致故善用藥者須知寒凉之味况兼應三才造化通塞之理也故經所謂不知年之所加氣之盛衰虚實之所起不可以為功矣大抵雜病者氣之常也隨方而異其治不同卒病者氣之異也其治則同其愈則異昔黄帝興四方之問岐伯舉四治之能故傷寒之法備矣哉大矣哉若視深淵如迎浮雲莫知其際是以知發表攻裏之藥性察標本虚實之併傳量老少壯弱之所宜勞逸緩急之稟性切脈明隂陽之分部詳證知邪氣之淺深故可言㑹通之法矣内經曰謹熟隂陽無與衆謀此之謂也病機論第七論曰察病機之要理施品味之性用然後明病之本焉故治病不求其本無以去深藏之大患故掉眩收引膹欝腫脹諸痛痒瘡皆根於内夫百病之生也皆生於風寒暑熱燥火以知化之變也經言盛者㵼之虛者補之余錫以方士而方士用之尚未能十全余欲令要道必行桴鼔相應猶拔刺雪汚工神聖可得備聞靈樞經曰刺深而猶可拔汚深而猶可雪莊子曰雪猶洗也岐伯曰審察病機無失氣宜此之謂也黄帝曰願聞病機何如岐伯對曰諸風掉眩皆屬於肝少慮無怒風勝則動肝者罷極之本魂之居也其華在𤓰其充在筋以生血氣其味酸其色蒼為将軍之官謀慮出焉此為隂中之少陽通於春氣其脈弦王注曰肝有二布葉一小葉如木甲拆之狀故經所謂其用為動乃木之為動火太過之政亦為動盖火木之主暴速所以掉眩也掉摇也眩昏亂也旋運皆生風故也是以風火皆屬陽陽主動其為病也胃脘當心痛上支兩脇隔咽不通食飲不下甚則耳鳴眩轉目不識人善暴強仆裏剥臑戾脇痛嘔泄甚則掉眩顛疾兩脇下痛引小腹令人善怒也虚則目䀮䀮無所見耳無所聞善恐如人將捕之凡病肝木風疾者以熱為本以風為標故火本不燔遇風烈乃焰肝本不甚熱因金衰而旺肺金不勝心火木來侮於金故諸病作矣其為治也燥勝風王注曰風自木生燥為金化風餘則制之以燥肝勝則治以清凉清凉之氣金之氣也木氣之下金氣承之又曰風滛於内治以辛凉肝欲散急食辛以散之故木主生榮而主春其性温故風火則反凉而毁折是兼金化制其木也故風病過急而反中外燥澁是反並金化也故非為金制其本是甚則如此中風偏枯者由心火暴甚而水衰不能制則火實尅金金不能平木則肝木勝而兼於火熱則卒暴強仆凡治消癉仆擊偏枯痿厥氣滿發肥實膏梁之疾也故此藏氣平則敷和太過則發生不及則委和諸痛痒瘡瘍皆屬於心静則神明熱勝則腫心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣其脈鈎其味苦其色赤為君主之官神明出焉此為陽中之陽也王注曰心形如未敷蓮花中有七空以導引天真之氣神明之窟也經所謂其用為燥火性燥動其明於外熱甚火赫爍石流金火之變也燔焫山川旋反屋宇火之災眚也故火非同水水智而火愚其性暴速其為病也當胷中熱嗌乾右胠滿皮膚痛寒熱咳嗽喘唾血血泄鼽衂嚏嘔溺色變甚則瘡痒胕腫肩背臑缺盆中痛瘍疹身熱驚惑惡寒戰慄譫妄悲忘衂衊語笑瘡瘍血流狂妄目赤胷中痛脇支滿脇下痛背膺肩甲間痛兩臂痛虚則胷腹大脇下與腰背相引而痛其為治也以寒勝熱王注曰小熱之氣凉以和之大熱之氣寒以取之甚熱之氣汗以發之發之不盡逆制之制之不盡求其屬以衰之又曰用水之主以制陽光經曰氣有多少病有盛衰治有緩急方有大小此之謂也是以熱淫于内治以鹹寒佐以甘苦以酸收之以苦發之心欲耎急食鹹以耎之君火之下隂精承之火氣之下水氣承之是故火主暴虐故燥萬物者莫熯乎火夏月火熱極甚則天氣薰蒸而萬物反潤以水出液林木津流及體熱極而反汗液出是火極而反兼水化俗以難辨認是作非不治已極反攻王氣是不明標本但隨兼化之虚象妄為其治反助其病而害於生命多矣故此藏平則升明太過則赫曦不及則伏明王注曰百端之起皆自心生諸濕腫滿皆屬脾土味和氣化濕勝則濡泄脾者倉廩之官本營之居也名曰器能化糟粕轉味而出入者也其華在脣其充在肌其味甘其色黃故為倉廩之官又名諫議之官五味出焉此至隂之類通於土氣為隂中之至隂也其脈緩王注曰脾形象馬蹄内包胃脘象土形也其用為化兼四氣聚散復形羣品以生灌溉肝心肺腎不主於時寄王四季經所謂善不可見惡不可見也其變驟注其災霖潰其為病也胕腫骨痛隂痺按之不得腰脊頭頸痛時眩大便難隂氣不用飲不欲食咳唾則有血積飲痞膈中滿霍亂吐下為善肌肉痿足不收行脇嗔嘔吐泄注下王注曰脾熱之生虚則腹滿腸鳴飱泄食不化者有胃之寒者有胃之熱者色白澄徹清冷皆屬於寒色黄水赤渾濁皆屬於熱故仲景曰邪熱不殺穀水性疾速此之謂也其為治也風勝濕濕自土生風為木化土餘則制之以風脾盛治之以燥故濕傷肉濕勝則濡泄甚則水閉胕腫王注曰濕為水水盛則腫水下形肉已消又曰濕氣為淫皆為腫滿但除其濕腫滿自衰若濕氣在上以苦吐之濕氣在下以苦泄之以淡滲之治濕之法不下小便非其治也故濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之若濕上甚而熱治以苦温佐以甘辛以汗為故而止濕淫於内治以苦熱佐以酸淡以苦燥之以淡泄之脾苦濕急食苦以燥之又曰土氣之下木氣承之本草曰燥可去濕桑白皮赤小豆之屬王注曰半身以上濕氣有餘火氣復欝所以明其熱能生濕經所謂風寒在下燥熱在上濕氣在中火游行其間是以熱之用矣故土主濕霒雲雨而𢎞靜雨熱極甚則飄驟散落是反兼風木制其土也若脾甚土自邕燥去其濕以寒除熱脾土氣衰以甘緩之所以燥泄積飲痞膈腫滿濕熱乾痼消渴慎不可以温藥補之故積温成熱性之温乃勝氣之藥也故此藏喜新而惡陳常令滋澤無使乾涸土平則備化大過則敦阜不及則卑濫諸氣膹欝病委皆屬於肺金歩淸氣利燥勝則乾肺者氣之本魄之處也其華在毛其充在皮其味辛其色白而為相傅之官治節出焉為陽中之少陽通於秋氣其脈毛王注曰肺之形象人肩二布葉一小葉中有二十四空行列以布分諸藏清濁之氣經所謂其用為固其變肅殺其眚蒼落其為病也骨節内變左胠脇痛寒清於中感而瘧太凉單候咳腹中鳴注泄鶩溏咳逆心脇滿引小腹善暴痛不可反側嗌乾面塵色惡腰痛丈夫㿗疝婦人少腹痛浮虚骩尻隂股髀腨胻是病皴揭實則喘欬逆氣肩背痛汗出尻隂股膝髀虚則少氣不能報息耳聾嗌乾其為治也熱勝燥燥自金生熱為火化金餘則治之以火肺勝則治之以苦又曰金氣之下火氣承之燥淫于内治以苦温佐以甘辛以苦下之若肺氣上逆急食苦以泄之王注曰制燥之勝必以苦温故受乾病生焉是以金主於秋而屬隂其氣凉凉極天氣清明而萬物反燥故燥苦火是金極而反兼火化也故病血液衰也燥金之化極甚則煩熱氣欝痿弱而手足無力不能收持也凡有聲之痛應金之氣故此藏平氣則審平太過則堅成不及則不從革諸寒熱皆屬於腎水能養動耗寒勝則浮腎者主蟄封藏之本精之處也其華在髮其充在骨其味醎其色黒為作強之官伎巧出焉為隂中之隂通於冬氣其脈石王注曰腎藏有二形如豇豆相並而曲附於膂筋外有脂褁裏白表黑主藏精故仙經曰心為君火腎為相火是言在腎屬火而不屬水也經所謂膻中者臣使之官喜樂出焉故膻中者在乳之間下合在于腎是火居水位得升則喜樂出焉雖君相二火之氣論其五行造化之理同為熱也故左腎屬水男子以藏精女子以繫胞右腎屬火遊行三焦興衰之道由於此故七節之傍中有小心是言命門相火也經所謂其變凝冽其眚氷雹其為病也寒客心痛腰腿痛大闗節不利屈身不便若厥逆痞堅腹滿寐汗實則腹脛腫喘咳身重汗出憎風虚則胷中痛大小腹痛清厥意不樂王注曰大小腹大小腸也此所謂左腎水發痛也若夫右腎命門相火之為病少氣瘡瘍疥癬癰腫脇滿胷背首面四肢浮腫腹脹嘔逆瘛瘲骨痛節有動注下溫瘧腹中暴痛血溢流注精液目赤心熱甚則瞀昧暴痛瞀悶懊憹嚏嘔瘡瘍驚燥喉痺耳鳴嘔涌暴注瞤瘛暴死瘤氣結核丹熛皆相火熱之勝也其為治也寒勝熱燥勝寒若熱淫於内治以鹹寒火所勝平以鹹冷故相火之下水氣承之如寒淫于内治以甘熱佐以苦辛寒淫所勝平以辛熱又曰腎苦燥急食辛以潤之腎欲堅食苦以堅之故水本寒寒急則水氷如地而能載物水發而雹雪是水寒亢極反似尅水之土化是謂兼化也所謂寒病極者反腎滿也左腎不足濟之以水右腎不足濟之以火故此藏水平則靜順不及則涸流太過則流衍諸厥固泄皆屬於下厥謂氣逆固為禁固氣則肝腎失守失守則不能禁固出入無度燥濕不恒故氣下則愈也經所謂厥氣上行滿脈去形諸瘧喘嘔逆皆屬於上肺者臓之長也為心之華盖故肺熱葉焦發痿躄是氣欝不利病喘息而嘔也嘔謂嘔酸水火氣炎上之象也胃膈熱甚則為嘔也若衰火之炎痿躄則愈利肺之氣喘息自調也道路開通吐嘔則除凡病嘔涌溢食皆屬之火也王注曰内路嘔逆食不得入是有火也經所謂三陽有餘則為痿易王注曰易有變易常用自痿弱無力也故此者熱之明矣諸熱瞀瘛皆屬于火熱氣甚則濁亂昏昧也瞀示乃昏也經所謂病筋脈相引而急名曰瘛者故俗為之搐是也熱勝風搏併于經絡故風主動而不寧風火相乗是以熱瞀瘛而生矣治法祛風滌熱之劑折其火勢熱瘛可立愈若妄加灼火或飲以發表之藥則取死不旋踵諸禁鼓如喪神守皆屬於火禁慄驚惑如喪神守悸動怔忪皆熱之内作故治當以制火劑其神守血榮而愈也諸痙項強皆屬于濕寒濕同性水火同居故足太陽膀胱經屬水而位下所以濕可傷也其脈起目内眥上額交于巔上其支别從巔入絡于腦還出則下項故主項強太陽表中風加之以濕客于經中内挾寒濕則筋脈抽急故痙項強不柔和此太陽傷食當詳有汗無汗治以流濕祛風緩發表而愈也諸逆衝上皆屬于火衝攻也火氣炎上故嘔涌溢食不下也諸脹腹大皆屬于熱肺主於氣貴乎通暢若熱甚則欝于内故肺脹而腹大是以火主長而髙茂形見彰顯升明舒葉皆腫之相也熱去則見白利也諸燥狂越皆屬于火胃實則四肢實而能登髙也故四肢者諸陽之本經所謂隂不勝陽則脈流薄疾病乃狂是以陽盛則使人妄言罵詈不避親踈神明之亂也故上善若水下愚若火此之謂也治之以補隂㵼陽奪其食則病已諸暴強直皆屬于風暴虐而害也強勁有力而不能和柔也乃厥隂風木勢甚而成此王注曰陽欝于内而隂行于外千金曰強直為風治以㵼火補金木能自平也諸病有聲鼓之如鼔皆屬于熱腹脹大而鼓之有聲如鼓者熱氣甚則然也經所謂熱勝則腫此之類也是以熱氣内欝不散而聚所以扣之如鼓也諸腹脹大皆為裏證何以明之仲景曰少隂病腹脹不大便者急下之宜大承氣湯所謂土勝堅水則乾急與大承氣湯下之以救腎水故知無寒其熱明矣諸病胕腫疼酸驚駭皆屬于火胕腫熱勝内則陽氣滯故也疼酸由火實制金不能平木則木旺而為酸酸者肝之味也故經所謂二陽一隂發病主驚駭王注曰肝主驚然肝主之原其本也自心火甚則善驚所以驚則心動而不寧也故火衰木平治之本也諸轉反戾水液渾濁皆屬于熱熱氣燥爍于筋故筋轉而痛應風屬于肝也甚則吐不止暍熱之氣加之以泄濕勝也若三氣雜乃為霍亂故仲景曰嘔吐而利若為霍亂故有乾霍亂有濕霍亂得其吐利邪其得出名曰濕霍亂也十存八九若不得吐利揮霍撩亂邪無出名曰乾霍亂十無一生者皆以冐暑中熱飲食不節寒熱氣不調清濁相干隂陽乖隔則為此病若妄言寒者大誤矣故熱則小便渾而不清寒則潔而不濁故井水煎湯沸則自然渾濁也諸病水液澄徹清冷皆屬于寒水液為病寒也故水清淨其氣寒冷水穀不化而吐利其色白腥穢傳化失常食已不飢雖有邪熱不殺穀而不飢者無倦而常好動其便色黄而酸王注曰寒者上下所出及吐出溺出也又法曰小寒之氣温以和之諸嘔吐酸暴注下廹皆屬於熱流而不腐動而不蠧吐嘔吐酸者胃膈熱甚則欝滯於氣物不化而為酸也酸者肝木之味或言吐酸為寒者誤也暴注者是注泄也乃腸胃熱而傳化失常經所謂清氣在下則生飱泄下廹者後重裏急窘廹急痛也火性急速而能造物故也俗云虚坐努責而痛也諸澁枯涸乾勁皴揭皆屬於燥澁枯者水液氣衰少血不榮於皮肉氣不通利故皮膚皴揭而澁也及甚則麻痺不仁涸乾者水少火多繫辭云燥萬物者莫熯乎火故火極熱甚水溢乾而不潤於身皮膚乃啓裂手足有如斧傷而深三二分者冬月甚而夏月衰故法曰寒能收斂收斂則燥澁皴揭熱能縱緩則滋榮潤澤皆屬燥金之化也王注曰物之生滑利物之死枯澁其為治也宜開通道路養隂退陽凉藥調之榮血通流麻木不仁澁涸乾勁皴揭皆得其所慎無服烏附之藥經所謂金木水火土運行之數寒暑燥濕火風臨御之化則失道可見民病可調凡受諸病者皆歸於五行六氣勝復盛衰之道矣王注曰人生有形不能無患既有其患亦常有逃生化出隂陽者也故曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疎其血氣令得調逹而致和平此之謂也氣宜論第八論曰治病必明六化分治五味五色所主五藏所宜五行之運行數六氣之臨御化然後明隂陽三才之數故數之可數者人中之隂陽也然所合之數可得見也夫隂陽者數之可卜推之可萬故天地隂陽者不以數推以象之謂也經曰丹天之氣經于牛女戌分黅天之氣經于心尾已分蒼天之氣經于危室栁鬼素天之氣經于亢氐昴畢𤣥天之氣經于張翼婁胃所謂戊巳分者奎壁角軫則天地之門户也是以將前三數與天象俱眀終始之六氣所司之髙下在泉淺深之勝復左右之間同與不同三紀太過不及之理故可分天地之化産民病之氣宜矣經所謂太陽司天之政故嵗宜苦以燥之温之陽眀司天之政故宜以苦辛汗之清之散之又宜以醎少陽司天之政故嵗宜以醎宜辛宜酸滲之泄之漬之發之觀氣寒温以調其氣太隂司天之政故宜以苦燥之濕之甚者發之泄之不發不泄則濕氣外溢肉潰皮坼而水血交流少隂司天之政故嵗宜醎以耎之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之厥隂司天之政故嵗宜以辛調之以醎潤之人必折其欝氣先資其化源是以迎而奪之主氣之法也故云六氣有餘用熱逺熱用温逺温用寒逺寒用凉逺凉食宜同法此其道也故王注曰夏寒甚則可以熱犯熱寒不甚則不可犯也若有表證若有裏證故法云發表不逺熱攻裏不逺寒不發不攻而犯寒犯熱使寒熱内賊其病益甚故無者生之有者甚之所以不逺熱則熱至不逺寒則寒至其寒至則堅痞腹痛急下利之病生矣熱至則身熱吐下霍亂癰疽瘡瘍瞀昏欝注下瞤瘛腫脹吐嘔鼽血衂血頭痛骨節變肉痛血溢泄淋閟之病生矣王注曰食已不飢吐利腥穢亦寒之疾也暴暗冐昧目不識人躁擾狂越譫妄罵詈驚癎亦熱之病也故經所謂無失天信無逆氣宜無翼其勝無贊其復是謂至也儻不知斯寒熱内賊失氣之宜因不知四時五行因加相勝釋邪攻正絶人長命術不通經為粗工之戒是以六氣上司九宫中司九元下司九宣三數俱眀各分主客勝復淫治尅伐主病嵗物氣味之厚薄故經所謂氣味有厚薄性用有躁靜治保有多少力化有淺深故少陽在泉寒毒不生太陽在泉熱毒不生故其氣專其味正少隂在泉寒毒不生太隂在泉燥毒不生此所謂天化地産故天地氣合氣合六節分而萬物化生矣經所謂謹候氣宜無失病機病機者寒暑燥濕風金木水火土萬病悉自此而生矣故謹察病機之本得治之要者乃能愈疾亦常有不明六氣五行之所宜氣味之厚薄所用人身為病之所由而能必獲其效者尠矣哉本草論第九論曰流變在乎病主治在乎物制用在乎人三者並明則可以語七方十劑宣通補㵼輕重澁滑燥濕是十劑也大小緩急竒偶復是七方也是以製方之體欲成七方十劑之用者必本於氣味生成而成方焉其寒熱温凉四氣者生乎天酸苦辛醎甘淡六味者成乎地氣味生成而隂陽造化之機存焉是以一物之中氣味兼有一藥之内理性不無故有形者謂之味無形者謂之氣若有形以無形之治喘急昏昧乃生無形以有形之治開腸洞泄乃起經所謂隂味出下竅陽氣出上竅王注曰味有質故下流便㵼之竅氣無形故上出呼吸之門故陽為氣隂為味味歸形形歸氣氣歸精精歸化精食氣形食味王注曰氣化則精生味化則形長是以有生之大形精為本故地産養形形不足温之以氣天産養精精不足補之以味形精交養充實不虧雖有苛疾弗能為害故温之以氣者是温之以肺補之以味者是補之以腎是以惟人萬物之靈備萬物之養飲和食徳以化津液以淫筋脈以行榮衞故經所謂隂之所生本在五味氣味合而服之以補精益氣所以為全生之術故五穀五畜五菜五果甘苦酸辛醎此為補養之要也何則榖入於口而聚於胃胃為水穀之海喜穀而惡藥藥之所入不若穀氣之先達故治病之法必以穀氣為先是以聖人論真邪之氣者謂汗生於穀不歸於藥石辨死生之候者謂安穀則生過期不惟數於五藏凡明胃氣為本以此知五味能養形也雖毒藥攻邪如國之用兵盖出于不得已也是以聖人發表不逺熱攻裏不逺寒辛甘發散為陽酸苦湧泄為隂故辛散酸收甘緩苦堅醎耎隨五藏之病證施藥性之品味然後分竒偶大小緩急之制也故竒偶者七方四制之法四制者大小緩急也經謂氣有多少病有盛衰治有緩急方有大小故大小者君一臣二竒之制也君二臣四偶之制也君二臣三竒之制也君二臣六偶之制也又曰竒方云君一臣二君二臣三偶方云君二臣四君二臣六所以七方者四制之法竒偶四制何以明之假令小承氣調胃承氣為竒之小方也大承氣抵當湯為竒之大方也所謂因其攻下而為之用者如此桂枝麻黄為偶之小方葛根青龍為偶之大方所謂因其發而用之者如此經所謂近者竒之逺者偶之身之表者為逺身之裏者為近汗者不以竒下者不以偶不以者不用也故補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄故味厚者為隂薄是隂之陽為味不純粹者也故味所厚則泄之以下味所薄則通氣者也王注曰味厚則泄薄則通氣氣厚者為陽薄者為陽之隂故附子乾薑味甘温大熱為純陽之藥為氣厚者也丁香木香味辛温平薄為陽之隂氣不純粹者也故氣所厚則發熱氣所薄則發泄經曰薄則發泄厚則發熱王注曰隂氣潤下故味薄則發泄陽氣炎上故氣厚則發熱味薄為隂少故通泄氣薄為陽少故汗出是以論氣味之薄厚合竒偶之大小腎肝位逺數多則其氣緩不能速達於下必大劑而數少取其迅急可以走下也心肺位近數少則其氣急不能發散于上必小劑而數多取其氣易散可以補上也王注曰肺服九心服七脾服五肝服三腎服一乃五藏生成之常數也若竒之不去則偶之是謂重方也偶之不去則反佐以取之是謂寒熱温凉反從其病也王注曰是以聖人反其佐以同其氣令聲氣應合復令寒熱參合使其終異而始同燥潤而敗堅剛強必折柔脆自消爾故逆者正治從者反治從少從多觀其可也假令仲景曰少隂病下利而脈微者與白通湯利不止厥逆無脈者乾嘔煩者白通加猪膽人尿王注曰若調寒熱之逆冷熱必行則熱物冷服下泄之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而致大益此加人尿猪膽汁醎苦寒物於白通湯熱劑中要其氣相從可去格拒之寒也經所謂熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已此之謂也若病所逺而中道氣味之者食而過之無越其制度王注曰假如病在腎而心之氣味飼而冷是仍急過之不飼以氣味腎藥凌心心腹益衰與上下逺近例同是以聖人治上不犯下治下不犯上和中上下俱無犯故經所謂誅罰無過命曰大惑此之謂也有中外不相及其治其主病皆論標本不令妄攻也故從所來者為本從所感者為標是以内者内調外者外治内者調之不言其治外者治之不言其調經所謂上淫于下所勝平之外淫于内所勝治之此之謂也若從内之外盛于外先調其内而後治其外從外之内而盛于内者先治其外而後調其内王注曰皆謂先除其根柢後削其枝條也是故病發有餘本而標之後治其本故仲景曰傷寒醫下之續得下利清穀身疼痛者急當救裏身疼痛清便自調者急當救表救裏四逆湯救表宜桂枝湯故裏不足必先救之清便自調知裏氣已調然後急與桂枝湯以救表是謂病發本而標之先治其本後治其標此以寒為本也故知標本者萬舉萬全不知標本者是謂妄行此之謂也雖本草曰上藥一百二十種為君應天中藥一百二十種為臣應人下藥一百二十五種為使應地若治病者特謂此三品之説未也經所謂有毒無毒所治為主適其小大為治也故主病者為之君佐君者為之臣應臣者為之使非上中下三品之謂也王注曰但能破積愈疾解急脱死則為良方非必要以先毒為是後毒為非有毒為是無毒為非必量病輕重大小之治也帝曰三品何謂也岐伯曰所以明善惡之殊貫也是以聖人有毒無毒服自有約故病有新久方有大小有毒無毒宜合常制矣大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九榖肉果菜食養盡之無使過之傷其正也不盡行復如法王注曰法謂前四約也餘病不盡須再行之毒之小大如約而止必無太過矣是以上古聖人謂重身之毒有故無殞衰其大半而止故藥之性味本以藥治疾誠能處以中庸以疾適當且如半而止之亦何疑於攻治哉此之謂也故非調氣而得者治之柰何有毒無毒何先何後願聞其道王注曰夫病生類其有四焉一者始因氣動而内有所成為積聚癥瘕瘤氣癭起結核癲癎之類是也二者始因氣動而外有所成謂癰腫瘡瘍痂疥疽痔掉瘛浮腫目赤熛胗胕腫痛痒之類是也三者不因氣動而生病于内為留飲澼食飢飽勞損宿食霍亂悲恐喜怒想慕憂結之類是也四者不因氣動而病生於外為瘴氣賊魅蠱毒蜚尸鬼擊衝薄墜墮風寒暑濕斫射刺割捶扑之類是也如此四類者有獨治内而可愈大小承氣陷胷抵當湯三花神祐藏用之類是也有兼治内而愈者大小柴胡通聖洗心凉膈黃連解毒之類是也有獨治外而愈者善應膏拔毒散㸃眼藥生肌之類是也有兼治外而愈者撥雲散苦參散千金内托散之類是也有先治内後治外而愈者熛胗丹毒瘡瘍疹麩豆之類悉因三焦相火熱甚於内必先疎啓其中凉苦寒之劑盪滌藏府或以砭射敷掃塗抹於外者是也有先治其外後治其内而愈者傷寒刺割破傷皆因風寒之邪從外之内先以發散其外發之不已量其淺深峻泄之有齊毒而攻擊者暴病大小便不利胎死堅積滿脹之類是也有復無毒而調引者痰滯氣痞胃虚脾弱氣不往來以通經利其氣之藥之類是也凡此之類方中所施或勝或復寒者熱之熱者寒之温者清之散者收之抑者折之燥者潤之急者緩之剛者耎之衰者補之強者㵼之堅者削之留者攻之客者除之勞者温之温養也結者散之燥者濡之損者温之温補也逸者行之勞者動之驚者平之平常也常見常聞上之吐之下之泄之磨之火灸之浴薄之劫之燔針劫刺其下開之發之適可為度各安其氣必清必淨則病氣衰去歸其所宗此治之大體也是以聖人法無定體體變布施藥不執方合宜而用故論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起柰何治諸寒而熱者取之以隂熱而寒者取之以陽所謂求其屬也王注曰謂治之而病不衰退反因熱寒而隨生寒熱病之新者也謂其益火之原以消隂翳用水之主以制陽光故曰求其屬也夫取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行若強腎之隂熱之猶可此論五味所歸五藏寒熱温凉之主也嗚呼聖人之道久塞而後之人獨不能之也王注曰言少可以貫多舉淺可以料大何法之眀也如此故非聖人之道孰能至於是邪是以治病之本須明氣味之厚薄七方十劑之法也方有七劑有十故方不七不足以盡方之變劑不十不足以盡劑之用方不對病非方也劑不蠲疾非劑也今列而論之七方者大小緩急竒偶復大方之説有二一則病有兼證而邪不專不可以一二味治之宜君一臣三佐九之類是也二則治腎肝在下而逺者宜分兩多而頓服之是也小方之説有二一則病無兼證邪氣專一可以君一臣二小方之治也二則治心肺在上而廹者宜分兩微而頻頻少服之亦為小方之治也緩方之説有五有甘以緩之為緩方者為糖蜜甘草之類取其戀膈也有丸以緩之為緩方者盖丸之比湯散藥力宣行遲故也有品味羣衆之緩方者盖藥味衆多各不能騁其性也有無毒治病之緩方者盖藥性無毒則功自緩也有氣味俱薄之緩方者藥氣味薄則常補於上比至其下藥力既已衰為補上治上之法也急方之説有四有急病急攻之急方者如腹心暴痛前後閉塞之類是也有急風蕩滌之用急方者謂中風不省口噤是也取湯劑蕩滌取其易散而施功速者是也有藥有毒之急方者如上湧下泄奪其病之大勢者是也有氣味厚之急方者藥之氣味厚者直趨于下而力不衰也謂補下治下之法也竒方之説有二有古之單行之竒方者為獨一物是也有病近而宜用竒方者為君一臣二君二臣三數合於陽也故宜下不宜汗也偶方之説有二有兩味相配而為偶方者盖兩方相合者是也有病逺而宜用偶方者君二臣四君二臣六數合於隂也故宜汗不宜下復方之説有二有二三方相合之為復方者如桂枝二越婢湯一之類是也有分兩匀同之復方者如胃風湯各等分之類是也又曰重複之複二三方相合而用也反復之復謂竒之不去則偶之是也十劑者宣通補㵼輕重澁滑燥濕宣者宣欝欝而不散為壅必宣劑以散之如痞滿不通之類是也本草曰宣可去壅必宣劑以散之如薑橘之屬攻其裏則宣者上也泄者下也湧劑則瓜蒂梔䜴之類是也發汗通表亦同通留而不行為滯必通劑以行之如水病痰癖之類也本草曰通可去滯通草防己之屬攻其環則通者行也甘遂滑石茯苓芫花大㦸牽牛木通之類是也補不足為弱必補劑以扶之如氣形羸弱之類是也本草曰補可去弱人參羊肉之屬攻其裏則補養也經所謂言而微終日乃復言者此奪氣也故形不足温之以氣精不足補之以味是以膏粱理疾藥石蠲疾五穀五畜能補善養也㵼有餘為閉必洩劑以逐之如腹脹脾約之類是也本草曰洩可去閉即葶藶大黃之屬經謂濁氣在上則生腹脹故氣不施化而欝閉不通所以葶藶大黃味苦大寒專能洩熱去濕下氣仲景曰跌陽脈浮而澁浮則胃強澁則小便數浮澁相搏大便難其脾為約故約束津液不得四布苦寒之劑通寒潤燥而能泄胃強也輕實則氣壅欲其揚也如汗不發而腠宻邪勝而中藴必輕劑以揚之本草曰輕可去實麻黃葛根之屬經所謂邪在皮者汗而發之其實者散而泄之王注曰陽實則發散重怯則氣浮欲其鎮也如䘮神守而驚悸氣上厥以顛疾必重劑以鎮之本草曰重可去怯即磁石鐵粉之屬經所謂厥成為顛疾故驚乃平之所以鎮涎也故使其物體之重則下涎而用之也澁滑則氣脱欲其收歛也如開腸洞洩便溺遺失必澁劑以收之本草曰澁可去脱則牡蠣龍骨之屬如寧神寧聖散之類是也滑澁則氣著欲其利也如便難内閉必滑劑以利之本草曰滑可去著即冬葵榆皮之屬滑能養竅故潤利也燥濕氣淫勝腫滿脾濕必燥劑以除之本草曰燥可去濕即桑白皮赤小豆之屬所謂濕甚于上以苦泄之以淡滲之是也濕津耗為枯五藏痿弱榮衞涸流必濕劑以潤之本草曰濕可去枯即紫石英之屬故痿弱者用之王注曰心熱盛則火獨光火炎上腎之脈常不行令火盛而上炎用事故腎脈亦隨火炎爍而逆上行也隂氣厥逆火復内焰隂上隔陽下不守位心氣通脈故生脈痿是故腕樞紐如折去而不相提挈脛筋縱緩而不能任用故也可下數百行而愈故此十劑七方者乃太古先師設繩墨而取曲直何叔世方士出規矩以為方圓王注曰嗚呼人之死者但曰命不謂方士愚昧而殺之邪是以物各有性謂物之性有盡也制而用之將使之無盡物之用有窮也變而通之將使之無窮夫惟性無盡用無窮故施於品劑以佐使斯人其功用亦不可一而足也於是有因其性而為用者有因其所勝為制者有氣同則相求者有氣相尅則相制者有氣餘而補不足者有氣相感則以意使者有質同而性異者有名異而實同者故蛇之性竄而引藥蟬之性脱而退翳䖟飲血而用以治血䑕善穿而用以治漏所謂因其性而為用者如此弩牙速産以機發而不括也杵糠下噎以杵築下也謂因其用而為使者如此萍不沈水可以勝酒獨活不摇風可以治其風所謂因其所勝而為之用制也如此麻木穀而治風豆水穀而治水所謂氣相同則相求者如此牛土畜乳可以止渴疾豕水畜心可以鎮恍惚所謂因其氣相尅則相制也如此熊肉振羸兔肝明視所謂因其氣有餘補不足也如此鯉之治水鶩之利水所謂因其氣相感則以意使者如此蜂蜜成於蜂蜜温而蜂寒油本生於麻麻温而油寒兹同質而異性也蘼蕪生於芎藭蓬蔂生於覆盆兹名異而實同者也所以如此之類不可勝舉故天地賦形不離隂陽形色自然皆有法象毛羽之類生於陽而屬於隂鱗介之類生於隂而屬於陽空青法木色青而主肝丹砂法火色赤而主心雲母法金色白而主肺磁石法水色黒而主腎黃石脂法土色黃而主脾故觸類而長之莫不有自然之理也欲為醫者上知天文下知地理中知人事三者俱明然後可以愈人之疾病不然則如無目夜遊無足登陟動致顛隕而欲愈疾者未之有也故治病者必明天地之理道隂陽更勝之先後人之夀夭生化之期乃可以知人之形氣矣王注曰不明天地之理又昧隂陽之候則以夀為夭以夭為夀雖盡上聖救生之道心明經脈藥石之妙猶未免世中之誣斥也明乎醫者幸詳究焉保命集卷上
