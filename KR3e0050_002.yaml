body:
  text: 保命集卷中金張元素撰中風論第十論曰經云風者百病之始善行而數變行者動也風本生於熱以熱為本以風為標凡言風者熱也叔和云熱則生風冷生氣是以熱則風動宜以靜勝其躁是養血也治須少汗亦宜少下多汗則虚其衞多下則損其榮汗下各得其宜然後宜治在經雖有汗下之戒而有中藏中府之説中府者宜汗之中藏者宜下之此雖合汗下亦不可過也仲景曰汗多則亡陽下多則亡隂亡陽則損其氣亡隂則損其形經曰氣血者人之神不可不謹養也初謂表裏不和須汗下之表裏已和是宜治之在經也其中府者面加五色有表證脉浮而惡風惡寒拘急不仁或中身之後或中身之前或中身之側皆曰中府也其治多易中藏者唇吻不收舌不轉而失音鼻不聞香臭耳聾而眼瞀大小便秘結皆曰中藏也其治多難經曰六府不和流結為癰五藏不和九竅不通若外無留結内無不通必知在經也初證既定宜以大藥養之當順時令而調隂陽安藏府而和榮衞察病機審氣宜而少有不愈者若風中府者先以加減續命湯隨證發其表若忽中藏者則大便多秘澁宜以三化湯通其滯表裏證已定别無他變故以大藥和治之大抵中府者多著四肢中藏者多滯九竅雖中府者多兼中藏之證至於舌强失音久服大藥能自愈也有中風濕者夏月多有之其證身重如山不能轉側宜服除濕去熱之藥治之不可用鍼可用灸今具六經續命湯方小續命湯通治八風五痺痿厥等疾以一歳為緫以六經為别春夏加石膏知母黄芩秋冬加桂附芍藥又於六經别藥隨證細分加減自古名醫不能越此凡覺中風必先審六經之候愼勿用大熱藥烏附之類故陽劑剛勝積燎原為消狂瘡腫之屬則天癸竭而榮涸是以中風有此誡故經所謂邪風之至疾如風雨易曰橈萬物者莫疾乎風若感之淺者留於肌膚感之深者達於骨髓盖禍患之機藏於細㣲非常人之豫見及其至也雖智者不能善其後是以聖人之教下皆謂之虚邪賊風避之有時故中風者俱有先兆之證凡人如覺大拇指及次指麻木不仁或手足不用或肌肉蠕動者三年内必有大風之至經曰肌肉蠕動命曰㣲風宜先服八風散愈風湯天麻丸各一料為效故手大指次指手太隂陽明經風多著此經也先服袪風滌熱之劑辛凉之藥治内外之邪是以聖人治未病不治已病又曰善治者治皮毛是止於萌芽也故初成者獲愈固久者伐形是治未病之先也中風之人如小便不利不可以藥利之既得自汗則津液外亡小便自少若利之使榮衞枯竭無以制火煩熱愈甚當候熱退汗止小便自行也兼此證乃陽明大忌利小便須當識此中風之人能食者凡中風病多能食盖甲已化土脾盛故能食由是多食則脾氣愈盛土克制腎水水虧則病増劇也病宜廣服藥不欲多食病能自愈中風多食者風木也盛則克脾脾受敵求助於食經曰實則夢與虚則夢取是也當㵼肝木治風安脾脾安則食少是其效也中風之人不宜用龍麝犀珠譬之提鈴巡於街使盜者伏而不出益使風邪入於骨髓如油入麫莫能出也此之類焉若痰潮不省昏憒不知事宜用藥下其痰涎故風者百病之長庸可忽諸小續命湯麻黄去節人參黄芩各一兩芍藥防己桂川芎各一兩防風一兩半附子半兩杏仁甘草各一兩右除附子杏仁外搗為麄末後入二味令勻每服五七錢水一盞半生薑五片煎至一盞去滓稍熱服食前凡中風不審六經之加减雖治之不能去其邪也内經云開則浙然寒閉則熱而悶知暴中風邪宜先以加减續命湯隨證治之中風無汗惡寒麻黄續命主之麻黄防風杏仁依本方添加一倍宜鍼太陽至隂出血崑崙舉蹻中風有汗惡風桂枝續命主之桂枝芍藥杏仁依本方加一倍宜鍼風府已上二證皆太陽經中風也中風無汗身熱不惡寒白虎續命主之石膏知母一料中各加二兩甘草依本方加一倍中風有汗身熱不惡風葛根續命主之葛根二兩桂枝黄芩依本方加一倍宜鍼陷谷刺厲兊鍼陷谷者去陽明之賊刺厲兊者瀉陽明經之實也已上二證陽明經中風也中風無汗身凉附子續命主之附子加一倍乾薑加一兩甘草加三兩宜刺隠白穴去太隂之賊也此一證太隂經中風也中風有汗無熱桂枝續命主之桂枝附子甘草依本方加一倍宜鍼太谿此證少隂經中風也中風六證混淆繫之於少陽厥隂或肢節攣痛或麻木不仁宜羌活連翹續命主之小續命八兩加羌活四兩連翹六兩古之續命混淆無六證之别今各分經治療又分經鍼刺法厥隂之井大敦刺以通其經少陽之經絶骨灸以引其熱是鍼灸同象法治之大體也中風外無六經之形證内無便溺之阻格知血弱不能養筋故手足不能運動舌强不能言語宜養血而筋自榮大秦芁湯主之秦芁三兩甘草二兩川芎二兩當歸二兩白芍藥一兩細辛半兩川羌活防風黄芩各一兩石膏二兩呉白芷一兩白术一兩生地黄一兩熟乾地黄一兩白茯苓一兩川獨活二兩右一十六味剉每服一兩水煎去滓温服無時如遇天隂加生薑煎如心下痞每兩加楮實一錢同煎中風外有六經之形證先以加减續命湯隨證治之内有便溺之阻格復以三化湯主之厚朴大黄枳實羌活各等分右剉如麻豆大每服三兩水三升煎至一升半終日服之以㣲利為度無時法曰四肢不舉俗曰癱瘓故經所謂太過則令人四肢不舉又曰土太過則敦阜阜髙也敦厚也既厚而又髙則令除去此真所謂膏粱之疾非肝腎經虚何以明之經所謂三陽三隂發病為偏枯痿易四肢不舉王注曰三隂不足則發偏枯三陽有餘則痿易易為變易常用而痿弱無力也其治則瀉令氣弱陽衰土平而愈或三化湯調胃承氣湯選而用之若脾虚則不用也經所謂土不及則卑陷卑下也陷坑也故脾病四肢不用四肢皆禀氣於胃而不能至經必因於脾乃不得禀受也令脾不能與胃行其津液四肢不得禀水穀氣日以衰脉道不利筋骨肌肉皆無氣以生故不用焉其治可補十全散加减四物去邪留正愈風湯中風證内邪已除外邪已盡當服此藥以行𨗳諸經久服大風悉去縱有㣲邪只從此藥加减治之然治病之法不可失其通塞或一氣之㣲汗或一旬之通利如此為常治之法也久則清濁自分榮衞自和如此初覺風動服此不致倒仆羌活甘草防風蔓荆子川芎細辛枳殻人參麻黄甘菊薄荷枸杞子當歸知母地骨皮黄耆獨活杜仲呉白芷秦芁柴胡半夏前胡厚朴熟地黄防己各二兩茯苓黄芩各二兩石膏四兩芍藥三兩蒼术生地黄各四兩桂一兩已上三十三味通七十三兩右剉毎服一兩水二盞煎至一盞去滓溫服如遇天隂加生薑煎空心一服臨卧再煎藥滓服俱要食逺服空心一服噀下二丹丸為之重劑臨卧一服噀下四白丹為之輕劑動以安神靜以清肺假令一氣之㣲汗用愈風湯三兩麻黄一兩均作四服一服加生薑五片空心服以粥投之得㣲汗則佳如一旬之通利用愈風三兩大黄一兩亦均作四服如前煎臨卧服得利則妙常服之藥不可失四時之轉如朢春大寒之後加半夏二兩通四兩柴胡二兩通四兩人參二兩通四兩謂迎而奪少陽之氣也朢夏之月半加石膏二兩通六兩黄芩二兩通五兩知母二兩通四兩謂迎而奪陽明之氣也季夏之月加防己二兩通四兩白术二兩茯苓二兩通五兩謂勝脾土之濕也初秋大暑之後加厚朴二兩通四兩藿香二兩桂一兩通二兩謂迎而奪太隂之氣也霜降後朢冬加附子一兩桂一兩通二兩當歸二兩通四兩謂勝少隂之氣也得春减冬四時類此雖立法於四時之加减更宜臨病之際審病之虚實熱寒土地之宜邪氣之多少此藥具七情六慾四氣無使五藏偏勝及不動於榮衞如風秘服之則永不燥結如久瀉服之則能自調初覺風氣便能服此藥及新方中天麻丸各一料相為表裏治未病之勝藥也及已病者更宜常服無問男子婦人及小児驚癎搐急慢驚風等病服之神効如解利四時傷風隨四時加减法又療脾腎虛筋弱語言難精神昏憒及治内弱風濕内弱者乃風熱火光體重者乃風濕土餘内弱之為病或一臂肢體偏枯或肥而半身不隨或恐而健忘喜以多思故思忘之道皆情不足也是以心亂則百病皆生心靜則萬病悉去故此藥能安心養神調隂陽無偏勝及不動榮衞四白丹能消肺氣養魄謂中風者多昏冒氣不清利也白术半兩白芷一兩白茯苓半兩白檀一錢半人參半兩知母二錢縮砂仁半兩羌活二錢半薄荷三錢半獨活二錢半防風川芎各五錢細辛二錢甘草五錢甜竹葉二兩香附子五錢炒龍腦半錢另研麝香一字另研牛黄半錢藿香一錢半右件二十味計八兩六錢三字為細末煉蜜為丸毎兩作十丸臨卧嚼一丸分五七次嚼之上清肺氣下强骨髄二丹丸治健忘養神定志和血内安心神外華腠理丹參一兩半丹砂五錢為衣逺志半兩去心茯神一兩人參五錢菖蒲五錢熟地黄一兩半天門冬一兩半去心麥門冬一兩去心甘草一兩右為細末煉蜜為丸如桐子大毎服五十丸至一百丸空心食前常服安神定志一藥清肺一藥安神故清中清者歸肺以助天真淸中濁者堅强骨髓血中之清榮養於神血中之濁華榮腠理如素有痰久病中風津液湧溢在胸中氣所不利用獨聖散吐之後用利氣瀉火之劑本方在後㵼青丸治中風自汗昏冒發熱不惡寒不能安卧此是風熱煩燥當歸龍膽川芎梔子羌活大黄防風各等分右為細末煉蜜為丸如彈子大每服一丸竹葉湯化下天麻丸係新方中天麻六兩酒浸三日曝乾秤牛膝六兩同上浸杜仲七兩剉炒去絲萆解六兩别碾為細末秤𤣥參六兩當歸十兩生地黄十六兩羌活十兩附子一兩右為細末煉蜜為丸如桐子大常服五七十丸病大至百丸空心食前温酒或白湯下平明服藥至日高饑則止服藥大忌壅塞失於通利故服藥半月稍覺壅㣲以七宣丸輕踈之使藥再為用也牛膝萆解治筋骨杜仲使筋骨相著天麻羌活和風之勝藥當歸地黄養血能和榮衞𤣥參主用附子佐之行經也獨聖散治諸風隔實諸癎痰涎津液湧溢雜病亦然𤓰蒂一兩右剉如麻豆大炒令黄色為細末每服量虚實久新或三錢藥末茶一錢酸虀汁一盞調下若用吐法天氣清明隂晦無用如病卒暴者不拘於此法吐時辰午巳前故内經曰平旦至日中天之陽陽中之陽也論四時之氣仲景曰大法春宜吐是天氣在上人氣亦在上一日之氣卯辰之寅候也故宜早不宜夜也先令病人隔夜不食服藥不吐再用熱虀水投之如吐風癎病者加全蝎半錢㣲炒如有蟲者加狗油五七㸃雄黄末一錢甚者加芫花末半錢立吐其蟲如濕腫滿者加赤小豆末一錢故此不可常用大要辨其虚實實則𤓰蒂散虚則梔子䜴湯滿加厚朴不可一槩用之吐罷可服降火利氣安神定志之劑治風癎病不能愈者從厚朴丸宜春秋加添外又於毎一料中加人參菖蒲茯神去木各一兩半右依厚朴丸春秋加添法和劑服餌厚朴丸方在吐論中防風通聖散防風川芎當歸芍藥大黄芒硝連翹薄荷麻黄不去節各半兩石膏桔梗黄芩各一兩白术山梔子荆芥穂各二錢半滑石三兩甘草二兩右為麄末每服一兩生薑同煎温服日再服勞汗當風汗出為皶鬱乃座勞汗出於𤣥府脂液所凝去芒硝倍加芍藥當歸發散𤣥府之風當調其榮衞俗云風刺或生癮疹或赤或白倍加麻黄鹽豉葱白出其汗麻黄去節亦去芒硝醎走血而内凝故不能發汗罷依前方中加四物湯黄連觧毒三藥合而飲之日二服故内經曰以苦發之謂熱在肌表連内也小便淋閟去麻黄加滑石連翹煎藥湯調木香末二錢七麻黄主表不主於裏故去之腰脇痛走疰疼痛者加硝石當歸甘草一服各二錢調車前子末海金砂末各一錢内經曰腰者腎之府破傷風者如在表則辛以散之在裏則苦以下之兼散之汗下後通利血氣袪逐風邪每一兩内加荆芥穂大黄各二錢調全蝎末一錢羌活末一錢諸風潮搐小兒急慢驚風大便結秘邪熱暴甚腸胃乾燥寢汗咬牙上竄睡語筋轉驚悸肌肉蠕動毎一兩加大黄二錢梔子二錢調茯苓末二錢如肌肉蠕動者調羌活末一錢故經曰肌肉蠕動命曰㣲風風傷於肺欬嗽喘急毎一兩加半夏桔梗紫菀各二錢如打撲傷損支節疼痛腹中惡血不下毎一兩加當歸大黄各三錢半調沒藥乳香末各二錢解利四時傷寒内外所傷毎一兩内加益元散一兩葱白十莖鹽䜴一合生薑半兩水一椀同煎至五七沸或煎一小椀温冷服一半以筯投之即吐罷後服一半稍熱服汗出立解如飲酒中風身熱頭痛如破者加黄連鬚二錢葱白十莖依法立愈慎勿用桂枝麻黄湯解之頭旋腦熱鼻塞濁涕時下毎一兩加薄荷黄連各二錢半内經曰膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不已也王注曰膽液下澄則為濁涕下不已如水泉故曰鼻淵也此為足太陽脉與陽明脉俱盛也如氣逆者調木香末一錢癘風論第十内經曰癘風者有榮氣熱附其氣不清故使鼻柱壊而色敗皮膚瘍潰故先風寒客於脉而不去名曰癘風又曰脉風成為癘俗云癩病也故治法云大風骨節重鬚眉堕名曰大風刺肌内病故汗出百日王注曰泄衞氣之怫熱刺骨髓汗出百日泄榮氣之􅀈熱凡二百日鬚眉生而止鍼􅀈熱屏退隂氣内復故多汗出鬚眉生也先樺皮散從少至多服五七日後灸承漿穴七壯灸瘡輕再灸瘡愈再灸後服二聖散泄熱祛血之風邪戒房室三年鍼灸藥止述類象形此治肺風之法也然非止肺藏有之俗云鼻屬肺而病發於肺端而言之不然如此者既鼻準腫赤脹但為瘡之類乃謂血隨氣化既氣不施化則血聚矣然血既聚使肉腐爛而生蟲也謂厥隂主生五蟲厥隂為風木故木主生五蟲盖三焦相火熱甚而制金金衰故木來尅侮經曰侮勝也宣瀉火熱利氣之劑䖝自不生也法云流水不腐户樞不蠧此之類也故此疾血熱明矣當以藥緩踈泄之煎局方内外升麻湯下錢氏内㵼青丸餘各隨經言之故病風者陽氣先受上也樺皮散治肺藏風毒遍身瘡疥及癮疹瘙痒搔之成瘡又治面風刺及婦人粉刺樺皮四兩燒灰荆芥穂二兩甘草半兩炙杏仁二兩去皮尖用水一椀於銀器内熬去水一半已来放令乾枳殻四兩去穣用炭火燒欲灰於温紙上令冷右件除杏仁外餘藥為末將杏仁别研令細次用諸藥令勻磁合内放之每服三錢食後溫酒調下二聖散治大風癘疾大黄半兩皂角刺三錢燒灰右將皂角刺一二斤燒灰研細煎大黄半兩湯調下二錢早服樺皮散中煎升麻湯下㵼青丸晚服二聖散此數等之藥皆為緩踈泄血中之風熱也七聖丸局方中七宣丸局方中皆治風壅邪熱潤利大腸中風風癎風癘大便秘澁皆可服之此方局方中治法曰雖呵子味苦澁而能止藏腑此利藥中用呵子令大黄枳實緩緩而推陳泄去邪氣若年老風秘澁者乃津液内亡也故不可用峻劑攻之内經曰年四十而氣自半也起居衰矣年五十體重耳目不聰明矣年六十隂痿氣大衰九竅不利下虗上實涕淚出矣故曰知之則强不知則老舉世皆言年老之人無熱俱虛豈不明年四十而隂氣自半故隂虚陽盛明矣是以隂虚其下陽甚其上故上實下虚此理明矣破傷風論第十二論曰夫風者百病之始也清淨則腠理閉拒雖有大風苛毒而弗能為害也故破傷風者通於表裏分别隂陽同傷寒證治閭閻徃徃有不知者只知有發表者不知有攻裏者和解者此汗下和三法也亦同傷寒證有在表者有在裏者有半在表半在裏者在裏宜下在表宜發汗在表裏之間宜和解然汗下亦不可過其法也又不可妄意處治各通其藏脉免汗泄之非宜也故破傷風者從外至内甚於内者則病也因此卒暴傷損風襲之間傳播經絡至使寒熱更作身體反强口噤不開甚者邪氣入藏則分汗下之治諸瘡不差榮衞虚肌肉不生瘡眼不合者風邪亦能外入於瘡為破傷風之候故諸瘡不差時舉世皆言著灸為上是謂熟瘡而不知火熱客毒逐經諸變不可勝數㣲則發熱甚則生風而搐或角弓反張口噤目斜皆因瘡鬱結于榮衞不得宣通而生亦有破傷不灸而病此者瘡著白痂瘡口閉塞氣難通泄故陽熱易為鬱結而熱甚則生風也故表脉浮而無力太陽也脉長而有力者陽明也脉浮而弦小者少陽也太陽宜汗陽明宜下少陽宜和解若明此三法而治不中病者未之有也羌活防風湯治破傷風邪初傳在表羌活防風川芎藁本當歸芍藥甘草各一兩地榆華細辛各二兩右㕮咀每服五錢水一盞半同煎至七分去滓熱服不拘時候量𦂳慢加减用之熱則加大黄二兩大便秘則加大黄一兩緩緩令過白术防風湯若服煎藥之過有自汗者宜服此藥白术一兩防風二兩黄耆一兩右㕮咀每服五七錢水一盞半煎至一盞去滓溫服不拘時候藏府和而有自汗可用此藥破傷風藏府秘小便赤自汗不止者因用熱藥汗出不休故知無寒也宜速下之先用芎黄湯三二服後用大芎黄湯下之芎黄湯川芎一兩黄芩六錢甘草二錢右㕮咀毎服五七錢水一盞半同煎至七分去滓温服不拘時候三服即止再用下藥大芎黄湯川芎一錢羌活黄芩大黄各一兩右㕮咀依前煎服宜和為度發表雄黄散雄黄一錢防風二錢草烏一錢右件為細末毎服一字温酒調下裏和至愈可服裏不和不可服蜈蚣散蜈蚣一對鰾五錢左蟠龍五錢炒煙盡為度野鴿糞是也右件為細末每服一錢清酒調下治法依前用裏和至愈可服但有裏證不可服次當下之用前蜈蚣散四錢巴豆霜半錢燒飰為丸如菉豆大每服一丸漸加六七丸清酒調蜈蚣散少許送下宣利為度内外風去可常服羌活湯緩緩而治不拘時候服之羌活湯者治半在表半在裏也羌活湯羌活菊花麻黄川芎石膏防風前胡黄芩細辛甘草枳殻白茯苓蔓荆子已上各一兩薄荷半兩呉白芷半兩右㕮咀每服五錢水一盞半入生薑五片同煎至一盞去滓稍熱服不拘時候日進二服防風湯治破傷風同傷寒表證未傳入裏宜急服此藥防風羌活獨活川芎各等分右㕮咀每服五錢水一盞半煎至七分去滓温服三二服後宜調蜈蚣散大效蜈蚣散蜈蚣一對鰾三錢右為細末用防風湯調下如前藥解表不已覺轉入裏當服左龍丸漸漸看大便硬軟加巴豆霜服之左龍丸左蟠龍五錢炒白殭蠶五錢炒鰾半兩炒雄黄一錢右同為細末燒飰為丸如桐子大毎服十五丸温酒下如裏證不已當於左龍丸末一半内入巴豆霜半錢燒飰為丸如桐子大每服一丸同左龍丸一處合服每服藥中加一丸如此漸加服至利為度若利後更服後藥若搐痓不已亦宜服後藥羌活湯也羌活湯羌活獨活防風地榆各一兩右㕮咀每服五錢水一盞半煎至一盞去滓溫服如有熱加黄芩有涎加半夏若病日久氣血漸虛邪氣入胃全養血為度養血當歸地黄散當歸地黄芍藥川芎藁本防風白芷各一兩細辛五錢右㕮咀依前煎服雄黄散治表藥天南星三錢半夏五錢天麻五錢雄黄二錢半右為細末毎服一錢温酒調下如有涎於此藥中加大黄為下藥地榆防風散治破傷風中風半在表半在裏頭㣲汗身無汗不可發汗宜表裏治之地榆防風地丁香馬齒莧各等分右件為細末每服三錢温米飲調下白术湯治破傷風大汗不止筋攣搐搦白术葛根各一兩升麻黄芩各半兩芍藥二兩甘草二錢半右㕮咀毎服一兩水一盞半煎至一盞去滓温服不拘時候江鰾丸治破傷風驚而發搐藏府秘澁知病在裏可用江鰾丸下之江鰾剉炒半兩野鴿糞半兩炒雄黄一錢白殭蠶半兩蜈蚣一對天麻一兩右件為細末又將藥末作三分用二分燒飰為丸如桐子大硃砂為衣後將一分入巴豆霜一錢同和亦以燒飰為丸如桐子大不用硃砂衣毎服硃砂為衣丸二十丸入巴豆霜一丸第二服二丸加至利為度再服硃砂為衣藥病愈止沒藥散刀箭藥止血住痛定粉一兩風化灰一兩枯白礬三錢另研乳香半錢另研没藥一字另研右件各研為細末同和勻再研摻之解利傷寒論第十三論曰傷寒之法先言表裏及有緩急三陽表當急裏當緩三隂表當緩裏當急又曰脉浮當汗脉沉當下脉浮汗急而下緩謂三陽表也脉沉下急而汗緩謂三隂裏也麻黄湯謂之急麻黄附子細辛湯謂之緩内經云有漬形以為汗為汗之緩裏之表也又云在皮者汗而發之為汗之急表之表也急汗者太陽緩汗者少隂是藏府之輸應也假令麻黄附子細辛湯是少隂證始得發熱脉沉裏和無汗故漬形以為汗假令麻黄湯是太陽證頭項痛腰脊强脉浮無汗裏和是也在皮者汗而發之也經曰治主以緩治客以急此之謂也麻黄湯麻黄去節五錢桂枝三錢甘草三錢炙杏仁去皮尖炒三十箇右㕮咀都作一服水煎去滓温服假令得肝脉其外證善潔面青善怒其三部脉俱弦而浮惡寒裏和謂清便自調也麻黄湯内加羌活防風各三錢謂肝主風是膽經受病大便秘或泄下赤水無數皆裏不和也假令得心脉其外證面赤口乾善笑其尺寸脉俱浮而洪惡寒裏和謂清便自調也麻黄湯内加黄芩石膏各三錢謂主心熱是小腸受病也假令得脾脉其外證面黄善噫善思善味尺寸脉俱浮而緩裏和惡寒麻黄湯内加白术防己各五錢謂脾主濕是胃經受病也假令得肺脈其外證面白善嚏悲愁不樂欲哭其尺寸脉俱浮而澁裏和惡寒麻黄湯内加桂枝生薑各三錢謂肺主燥是大腸受病也假令得腎脉其外證面黒善恐顯其尺寸脉俱浮而裏和惡寒麻黄湯加附子生薑謂腎主寒是膀胱受病也已上各五證皆表之表謂在皮者急汗而發之也皆腑受病表之裏者下之當緩謂隨藏表證外顯尺寸脉俱浮而復有裏證謂發熱飲水便利赤澁或泄下赤水按之内實或痛麻黄湯去麻黄杏仁與隨藏元加藥同煎作五服毎下一證初一服加大黄半錢邪盡則止未盡第二服加大黄一錢邪未盡第三服加大黄一錢半如邪未盡又加之邪盡則止此謂先緩而後急是表之裏證下之當緩也麻黄附子細辛湯麻黄半兩去根節細辛半兩去苗土附子一錢一分半炮裂去皮臍右㕮咀都作一服水煎去滓温服假令得肝脉其内證滿閉淋溲便難轉筋其尺寸脉俱沉而弦裏和惡寒肝經受病麻黄附子細辛内加羌活防風各三錢假令得心脉其内證煩心心痛掌中熱而噦其尺寸脉俱沉裏和惡寒心經受病加黄芩石膏各三錢假令得脾脉其内證腹脹滿食不消怠堕嗜卧其尺寸脉俱沉裏和惡寒脾經受病加白术防己各三錢假令得肺脉其内證喘咳洒浙寒熱其尺寸脉俱沉裏和惡寒肺經受病加生薑桂各三錢假令得腎脉其内證泄如下重足脛寒而逆其尺寸脉俱沉裏和惡寒腎經受病更加附子生薑各三錢已上五證裏之表也宜漬形以為汗皆藏受病也裏之裏者下之當急謂隨藏内證以顯尺寸脉俱沉復有裏證者謂大小便秘澁或泄下赤水或㵼無數不能飲食不惡風寒發熱引飲其脉俱沉或按之内實而痛此謂裏實宜速下之麻黄附子細辛内麻黄與隨藏元加藥内分作三服毎下一證初一服加大黄三錢邪盡則止如邪未盡再一服加大黄二錢又未盡第三服加大黄一錢此先急而後緩謂裏之裏也當速下之也通解利傷寒不問何經之受皆能混然解之謂不犯各經之受病雖不解盡亦無壞證羌活湯羌活二兩防風一兩川芎一兩黄芩一兩細辛二錢半甘草一兩炒黒地黄一兩薄荷半兩白术二兩如用蒼术加一兩右㕮咀毎服五七錢水二盞煎至一盞無時溫服淸如覺發熱引飲加黄芩甘草各一兩更隨證加頭痛惡風於白术湯一兩内加羌活散三錢都作一服羌活散羌活一兩半川芎七錢細辛根二兩半如身熱依前加石膏湯四錢石膏湯石膏二兩知母半兩白芷七錢如腹中痛者加芍藥散三錢芍藥散芍藥二兩桂五錢如徃來寒熱而嘔加柴胡散二錢柴胡散柴胡根一兩半夏五錢洗加生薑煎如心下痞加枳實一錢如有裏證加大黄初一服一錢次二錢又三錢邪盡則止論曰有汗不得服麻黄無汗不得服桂枝然春夏汗孔踈雖有汗不當用桂枝宜用黄耆湯和解秋冬汗孔閉雖無汗不當用麻黄宜用川芎湯和解春夏有汗脉乃㣲而弱惡風惡寒者乃太陽證秋冬之脉也亦宜黄耆湯無汗亦宜川芎湯秋冬有汗脉盛而浮發熱身熱者乃陽明證春夏之脉也亦宜黄耆湯無汗亦宜川芎湯大抵有汗者皆可用黄耆湯無汗者亦可用川芎湯黄耆湯有汗則止也黄耆白术防風各等分右㕮咀毎服五七錢至十餘錢或半兩一兩水煎温服清汗多惡風甚者加桂枝川芎湯無汗則發也川芎白术羌活各等分右㕮咀同黄耆湯稍熱服惡寒甚則及脉大浮半加麻黄法云五藏之脉寸闗尺也今止言尺寸隂陽也如陽緩而隂急表和而裏病隂緩而陽急裏和而表病也若傷寒食少發渇止可和胃止渇不可太凉藥止之然恐凉藥止之損着胃氣必不能食也和胃白术湯白术茯苓起卧不能謂之濕身重是也小柴胡湯黄芩芍藥湯起卧不安眠睡不穏謂之煩梔豉湯竹葉石膏湯解利四時傷寒混解六經不犯禁忌大白术湯白术二兩防風一兩羌活一兩川芎一兩黄芩五錢細辛三錢白芷一兩半石膏二兩知母七錢甘草五錢或一兩枳實去穰五錢右為麄末每服半兩水一盞半煎至一盞大温服清未解更一服兩服藥滓又作一服春倍防風羌活夏倍黄芩知母季夏雨淫倍白术白芷秋加桂五錢冬桂八錢或一兩立夏之後至立秋處暑之間傷寒者身多㣲凉㣲有自汗四肢沉重謂之濕溫又謂之濕淫宜蒼术石膏湯蒼术石膏湯蒼术細剉半兩石膏末三錢知母剉一錢半甘草剉一錢右同和勻都作一服水兩盞煎至一盞温服清謂内有濕熱也多不欲飲水如身熱脉洪無汗多渇者是熱在上焦積於胸中宜桔梗散桔梗散薄荷一錢黄芩一錢甘草一錢桔梗半兩連翹二錢山梔子仁一錢右剉每服五錢或七錢秤半兩水煎加竹葉如大便秘結加大黄半錢熱論第十四論曰有表而熱者謂之表熱也無表而熱者謂之裏熱也有暴發而為熱者乃久不宣通而致也有服温藥過劑而為熱者有惡寒戰慄而熱者盖諸熱之屬者心火之象也王注曰百端之起皆自心生是以上善若水下愚若火治法曰小熱之氣凉以和之大熱之氣寒以取之甚熱之氣則汗發之發之不盡則逆治之制之不盡求其屬以衰之故曰苦者以治五藏五藏屬隂而居於内辛者以治六府六府屬陽而在外故内者下之外者發之又宜養血益隂其熱自愈此所謂不治而治也故不治謂之常治治而不治謂之暴治經所謂諸寒而熱者取之隂諸熱而寒者取之陽此所謂求其屬也王注曰益火之源以消隂翳用水之主以制陽光此之謂也病有暴熱者病在心肺有積熱者病在腎肝暴熱者宜局方中雄黄解毒丸積熱者局方中妙香丸暴熱上喘者病在心肺謂之高喘木香金鈴子散上焦熱而煩者牛黄散藏府秘者大黄牽牛散上焦熱無它證者桔梗湯有虛熱不能食而熱者脾虚也宜以厚朴白术陳皮之類治之有實熱能食而熱者胃實也宜以梔子黄芩湯或三黄丸之類治之蔚金柴胡之類亦是也有病久憔悴發熱盜汗謂五藏齊損此熱勞骨蒸病也痩弱虗煩腸癖下血皆蒸勞也宜養血益隂熱自能退當歸生地黄或錢氏地黄丸是也木香金鈴子散治暴熱心肺上喘不已大黄半兩金鈴子三錢木香三錢輕粉少許朴硝二錢右為細末柳白皮湯調下三錢或四錢食後服以利為度喘止即止牛黄散治上焦熱而煩不能睡卧梔子半兩大黄半兩蔚金半兩甘草二錢半右為細末毎服五錢水煎温服食後㣲利則已大黄牽牛散治相火之氣遊走藏府大便秘結大黄一兩牽牛頭末五錢右為細末每服三錢有厥冷用酒調三錢無厥冷而手足煩熱者蜜湯調下食後㣲利為度此謂不時而熱者濕熱也地黄丸治久新憔悴寢汗發熱五藏齊損痩弱虚煩腸癖下血骨蒸痿弱無力不能運動熟地黄一兩山茱茰四錢乾山藥四錢牡丹皮白茯苓澤瀉各三錢右為細末煉蜜為丸桐子大毎服五十丸空心溫酒送下防風當歸飲子如煩渇皮膚索澤食後煎服防風飲子空心服地黄丸柴胡人參黄芩甘草各一兩大黄當歸芍藥各半兩滑石三兩右為麄末毎服五錢水一盞半生薑三片同煎至七分去滓温服如痰實欬嗽加半夏如大便黄米榖完出驚悸溺血淋悶欬血衂血自汗頭痛積熱肺痿後服大金花丸大金花丸黄連黄栢黄芩山梔子各一兩右為細末滴水為丸如小豆大毎服一百丸温水下日二三服或大便實加大黄自利不用大黄如中外有熱者此藥作散剉服名解毒湯或腹滿嘔吐欲作利者毎服半兩解毒湯中加半夏茯苓厚朴各三錢生薑三片如白膿下痢後重者加大黄三錢凉膈散加减附于后連翹山梔子大黄薄荷葉各半兩黄芩半兩甘草一兩半朴硝二錢半右件為麄末每服半兩水一盞半煎至一盞去滓入蜜一匙㣲煎温服食後咽嗌不利腫痛并涎嗽者加桔梗一兩荆芥穂半兩欬而嘔者加半夏二錢半生薑煎鼻衂嘔血者加當歸芍藥生地黄各半兩一料内如淋閟者加滑石四兩茯苓一兩或閟而不通臍下收如覆椀痛閟不可忍者乃腸胃乾涸膻中氣不下故經所謂膀胱者州都之官津液藏焉氣化則能出矣故膻中者臣使之官名三焦相火下合右腎為氣海也王注曰膀胱津液之府胞内居之少腹處間毛内藏胞器若得氣海之氣施化則溲便注下氣海氣之不及則閟隱不通故不得便利也先用木香沉香各三錢酒調下或八政散甚則宜上湧之令氣通達小便自通經所謂病在下上取之王注曰熱攻於上不利於下氣盛於上則温辛散之苦以利之當歸承氣湯當歸大黄各一兩甘草半兩芒硝九錢右剉如麻豆大每服二兩水一大椀入生薑五片棗十枚同煎至半椀去滓熱服若陽狂奔走罵詈不避親踈此陽有餘隂不足大黄芒硝去胃中實當歸補血益隂甘草緩中加生薑棗胃屬土此引至於胃中也經所謂㣲者逆之甚者從之此之謂也以大利為度㣲緩以𤓰蒂散加防風蔾蘆吐其病立愈後調法洗心散凉膈散解毒湯等藥調治之治熱入血室發狂不認人牛黄膏牛黄二錢半硃砂三錢腦子一錢蔚金三錢甘草一錢牡丹皮三錢右為細末煉蜜為丸如皂子大新水化下治暴熱者局方中雄黄解毒丸治久熱者局方中妙香丸治虛勞骨蒸煩熱下血者錢氏地黄丸治虚熱不能食者脾虚也宜以厚朴白术陳皮之類治之治實熱能食者胃實也宜以梔子黄芩或三黄丸之類治之蔚金柴胡亦可治表熱惡寒而渇白虎湯也膚如火燎而熱以手取之不甚熱為肺熱也目白睛赤煩躁或引飲獨黄芩一味主之水煎兩脇下肌熱脉浮弦者柴胡飲子主之兩脇肋熱或一身盡熱者或日晡肌熱者皆為血熱也四順飲子主之夜發熱主行隂乃血熱也四順桃仁承氣選用當視其腹痛血刺痛與有表入裏腹中轉失氣燥結之異晝則明了夜則譫語四順飲子證與桃仁承氣相似不可不辨也發熱雖無脇熱亦為柴胡證晝則行陽二十五度氣藥也大抵則柴胡夜則行隂二十五度血藥也大抵四順飲子内傷論第十五論曰人之生也由五穀之精化五味之備故能生形經曰味歸形若傷於味亦能損形令飲食反過其節腸胃不能勝氣不及化故傷焉經曰壯火食氣氣食少火壯火散氣少火生氣痺論曰飲食自倍腸胃乃傷或失四時之調養故能為人之病也經曰氣口𦂳而傷於食心胸滿而口無味與氣口同氣口者乃脾之外候故脾胃傷則氣口𦂳盛夫傷者有多少有輕重如氣口一盛脉得六至則傷於厥隂乃傷之輕也㯽榔丸主之氣口二盛脉得七至則傷於少隂乃傷之重也煮黄丸厚朴丸主之氣口三盛脉得八至則傷於太隂膩塞悶亂甚則心胃大痛兀兀欲吐得吐則已俗呼食迷國是也經曰上部有脉下部無脉其人當吐不吐則死宜吐之以𤓰蒂散如不能則無治也經曰高者因而越之下者引而竭之是也檳榔丸檳榔二錢半陳皮去白一兩木香二錢半牽牛頭末半兩右為細末醋糊為丸如桐子大每服十五丸至二十丸米飲下生薑湯亦可煮黄丸雄黄一兩另研巴豆五錢生用去皮研爛入雄黄末右二味再研入白麵二兩同和再研勻滴水為丸如桐子大每服時先煎漿水冷沸下藥二十四丸煑三十沸撈入冷漿水中沉水冷一時下一丸二日二十四時也加至㣲利為度用浸藥水送下此藥脇下痃癖痛如神𤓰蒂散𤓰蒂三錢赤小豆三錢右為細末温水調一錢以吐為度如傷之太重備急丸獨行丸皆急藥也金露丸治天行時疾内傷飲食心下痞悶大黄二兩枳實炒五錢牽牛頭末二兩桔梗二兩右同為細末燒飰為丸如桐子大每服三五十丸食後溫水下如常服十丸二十丸甚妙治氣不下降食難消化常服進食逐飲枳實丸枳實麩炒五錢白术一兩剉右為細末燒飰為丸如桐子大毎服五十丸水飲下治飲食不化心腹膨悶檳榔丸主之如甚則脇肋虚脹煮黄丸主之治氣不下降飲食難消金露丸主之諸瘧論第十六經曰夏傷於暑秋必病瘧盖傷之淺者近而暴發傷之重者逺而痎瘧痎者久瘧也是知夏傷於暑温熱閉藏而不能發泄於外邪氣内行至秋而發為瘧也初不知何經受之隨其動而取之有中三陽者有中三隂者大抵經中邪氣其證各殊同傷寒論之也故内經曰五藏皆有瘧其治各别在太陽經者謂之風瘧治多汗之在陽明經者謂之熱瘧治多下之在少陽經者謂風熱瘧治多和之此三陽受病皆謂之暴瘧發在夏至後處暑前此乃傷之淺者近而暴也在隂經則不分三經總謂之温瘧當從太隂經論之其病發在處暑後冬至前此乃傷之重者逺而為痎痎者老也故謂之久瘧氣居西方宜毒藥療之瘧之為病因内積暑熱之氣不能宣泄于外而為瘧也當盛夏之時能食寒凉之物而助隂氣者後使有暑熱之氣㣲者自消矣更時復以藥踈利藏府使邪氣自下内經曰春食凉夏食寒秋食温冬食熱是謂春夏養陽秋冬養隂人能於飲食起居之間順四時之氣而行之邪氣何由得生也治瘧病處暑前頭痛項强脉浮惡寒有汗桂枝羌活湯桂枝羌活防風甘草炙各半兩右為麄末毎服半兩水一盞半煎至一盞温服清迎發而服之如吐者加半夏麴等分治瘧病頭痛項强脉浮惡風無汗者麻黄羌活湯麻黄去節羌活防風甘草炙各半兩同前服如吐者加半夏麴等分治法瘧如前證而夜發者麻黄桂枝湯主之麻黄一兩去節甘草炙三錢桃仁三十箇去皮尖黄芩五錢桂二錢右五味同為細末依前服桃仁味苦甘辛肝者血之海血聚則肝氣燥經所謂肝苦急急食甘以緩之故桃仁散血緩肝謂邪氣深逺而入血故夜發乃隂經有邪此湯發散血中風寒之劑治瘧病身熱目痛熱多寒少脉長睡卧不安先以大柴胡湯下之㣲利為度如下過外㣲邪未盡者宜服白芷湯盡其邪白芷一兩知毋一兩七錢石膏四兩右為麄末同前服治瘧無他證隔日發先寒後熱寒少熱多宜桂枝石膏湯桂枝五錢石膏一兩半知母一兩半黄芩一兩右為麄末分作三服每服水一盞同前煎服間日者邪氣所舍深也治瘧寒熱大作不論先後此太陽陽明合病也謂之大爭寒作則必戰動經曰熱勝而動也發熱則必汗泄經曰汗出不愈知為熱也陽盛隂虚之證當内實外虚不治必傳入隂經也桂枝芍藥湯主之桂三錢黄耆二兩知母一兩石膏一兩芍藥一兩右為麄末每服五七錢至半兩水煎如前藥服之寒熱轉大者知太陽陽明少陽三陽合病也宜用桂枝黄芩湯和之柴胡一兩二錢黄芩四錢半人參四錢半半夏四錢甘草四錢半石膏五錢知母五錢桂二錢右為麄末依前服之服藥已如外邪已罷内邪未已再詮下藥從卯至午時發者宜以大柴胡湯下之從午至酉時發者知其邪氣在血也宜以桃仁承氣湯主之前項下藥㣲利為便以小柴胡湯徹其㣲邪之氣立秋之後及處暑前發瘧漸痩不能食者謂之痎瘧此邪氣深逺而中隂經為久瘧也治久瘧不能飲食胷中鬱鬱如吐欲吐不能吐者宜吐則已當以蔾蘆雄黄散吐之蔾蘆散大蔾蘆末半錢溫虀水調下以吐為度雄黄散雄黄𤓰蒂赤小豆各一錢右為細末每服半錢温水調下以吐為度治秋深久瘧胷中無物又無痰癖腹高而食少俗謂瘧氣入腹宜蒼术湯主之蒼术四兩草烏頭一錢杏仁三十箇右為麄末都作一服水三升煎至一半均作三服一日服盡迎發而服局方中七宣丸治瘧之聖藥也局方中神効飲子乃瘧疾聖藥也又名交結飲子吐論第十七論曰吐有三氣積寒也皆從三焦論之上焦在胃口上通於天氣主内而不出中焦在中脘上通天氣下通地氣主腐熱水穀下焦在臍下下通地氣主出而不納是故上焦吐者皆從於氣氣者天之陽也其脉浮而洪其證食已暴吐渇欲飲水大便燥結氣上衝而胷發痛其治當降氣和中中焦吐者皆從於積有隂有陽食與氣相假為積而痛其脉浮而匿其證或先痛而後吐或先吐而後痛治法當以毒藥去其積檳榔木香行其氣下焦吐者皆從於寒地道也其脉沉而遲其證朝食暮吐暮食朝吐小便清利大便秘而不通治法當以毒藥通其閉塞温其寒氣大便漸通復以中焦藥和之不令大便秘結而自愈也治上焦氣熱上衝食已暴吐脉浮而洪宜先和中桔梗湯桔梗一兩半半夏麴二兩陳皮去白一兩枳實麩炒一兩白茯苓去皮一兩白术一兩半厚朴一兩薑製炒香右㕮咀每服一兩水一盞煎至七分取清温調木香散二錢隔夜空腹食前服之三服之後氣漸下吐漸止然後去木香散加芍藥二兩黄耆一兩半每料中叩筭加上件分兩依前服之病愈則已如大便燥結食不盡下以大承氣湯去硝㣲下之少利為度再服前藥補之如大便復結又依前再㣲下木香散木香檳榔各等分右為細末前藥調服治暴吐者上焦氣熱所衝也經曰諸嘔吐酸暴主下迫皆屬於火脉洪而浮者荆黄湯主之荆芥穗一兩人參五錢甘草二錢半大黄三錢右為麄末都作一服水二盞煎至一盞去滓調檳榔散二錢空心服檳榔散檳榔二錢木香一錢半輕粉少許右為細末用前藥調服如為丸亦可用水浸蒸餅為丸如小豆大每服二十丸食後治上焦吐頭發痛有汗脉弦青鎮丸主之柴胡二兩去苗黄芩七錢半甘草半兩半夏湯洗半兩青黛二錢半人參半錢右為細末薑汁浸蒸餅為丸如桐子大每服五十丸生薑湯下食後白术湯治胃中虚損及痰而吐者半夏麴半兩白术一錢檳榔二錢半木香一錢甘草一錢茯苓二錢右六味同為細末每服二錢煎生薑湯調下食前吐而食脉弦者肝盛於脾而吐乃由脾胃之虚宜治風安脾之藥金花丸半夏湯洗一兩檳榔二錢雄黄一錢半右為細末薑汁浸蒸餅為丸如桐子大小兒另丸生薑湯下從少至多漸次服之以吐為度覊絆於脾故飲食自下治中焦吐食由食積與寒氣相假故吐而痛宜服紫沉丸半夏麴三錢烏梅去核一錢代赭石三錢杏仁去皮尖一錢縮砂仁三錢丁香二錢沉香一錢檳榔二錢木香一錢陳皮五錢白豆蔲半錢白术一錢巴豆霜半錢另研右為細末入巴豆霜令勻醋糊為丸如黍米大毎服五十丸食後生薑湯下吐愈則止小兒另丸治小兒食積吐食亦大妙一法治飜胃吐食用橘皮壹箇浸少時去白褁生薑一塊麵褁紙封燒令熟去麵外生薑為三畨並橘皮下紫沉丸一百丸一日二服得大便通至不吐則止此主寒積氣皆可治嘔吐腹中痛者是無積也胃强而乾嘔有聲無物脾强而吐食持實繫强是以腹中痛當以木香白术散和之木香一錢白术半兩半夏麴一兩檳榔二錢茯苓半兩甘草四錢右為細末濃煎芍藥生薑湯調下一二錢有積而痛手按之愈痛無積者按之不痛治下焦吐食朝食暮吐暮食朝吐大便不通宜附子丸附子炮五錢巴豆霜一錢砒半錢研細右同研極細鎔黄蠟為丸如桐子大毎服一二丸冷水送下利則為度利後更服紫沉丸常服不令再閉厚朴丸主反胃吐逆飲食噎塞氣上衝心腹中諸疾加法在後厚朴二兩半黄連二兩半紫菀去土苗呉茱茰湯洗七次菖蒲柴胡去苗桔梗皂角去皮弦子炙茯苓去皮官桂刮乾薑炮已上各二兩人參二兩巴豆霜一兩蜀椒去日閉口者做炒出汗二兩川烏頭炮裂去皮臍二兩半减半更炒右為細末入巴豆霜勻煉蜜和丸為劑旋丸桐子大每服三丸漸次加至以利為度生薑湯下食後臨卧此藥治療與局方温白丸同及治處暑以後秋冬間藏府下利大効春夏再加黄連二兩秋冬再加厚朴二兩計四兩治風癎病不能愈者從厚朴丸依春秋加添外又於每料中加人參菖蒲茯苓去皮各一兩半右依前法和劑服餌治反胃又大便不通者是腸勝胃也服局方中半硫丸一二百丸如大便秘用後藥附子半兩巴豆二枚砒一豆許右為極細末生薑糊為丸如菉豆大每服一丸白湯下霍亂論第十八論曰醫之用藥如將帥之用兵本草曰良醫不能以無藥愈疾猶良將無兵不足以勝敵也故用藥如用兵轉筋霍亂者治法同用兵之急不可緩也故吐㵼不止者其本在於中焦或因渇大飲或飲而過量或饑而飽甚或濕内甚故隂陽交而不和是為吐瀉仲景曰邪在上焦則吐邪在下焦則㵼邪在中焦則既吐且利此為急病也然吐利為急十死其一二如揮霍撩亂而不得吐㵼此名乾霍亂必死法曰既有其入必有所出今有其入而不得其出者否也塞也故轉筋吐瀉者其氣有三一曰火二曰風三曰濕吐為暍熱也王注曰炎熱薄爍心之氣也火能炎上故吐也瀉為濕也叔和云濕多成五泄内經曰濕勝則濡㵼又經曰風勝則動筋屬肝而應於風木故脚轉筋燥急也内經曰諸筋反戾水液渾濁皆屬於熱故仲景治法曰熱多欲飲水五苓散寒多不飲水者理中丸凡覺此證或先五苓益元桂苓甘露散乃吐㵼之聖藥也慎無與粟米粥湯穀入於胃則必死本草曰粟米醎㣲味寒無毒主養腎氣去脾胃中熱益氣霍亂者脾胃極損不能傳化加以粟米如人欲斃更以利刀鋸其首豈有能生者邪如吐㵼多時欲住之後宜㣲以粥飲漸以養之以遲為妙治霍亂轉筋吐㵼不止半夏湯半夏麴茯苓白术各半兩淡桂一錢半甘草炙二錢半右為細末渇者凉水調下不渇者溫水調下不計時候五苓散白术茯苓木猪苓各一兩半澤㵼二兩半桂一兩右為細末冷水調下或水煎三沸冷服亦得理中丸白术人參乾薑甘草各等分右為細末煉蜜為丸彈子大每服一丸冷水化下如吐㵼不止身冷汗出無脉者可服後㵼利論中漿水散兼桂枝湯白术湯皆可用後痢門中藥亦可選用凡霍亂不可飲熱白米湯飲之死不救㵼論第十九論曰藏府㵼利其證多種大抵從風濕熱論是知寒少而熱多寒則不能久也故曰暴㵼非陽久㵼非隂論曰春宜緩形形緩動則肝木乃榮反靜宻則是行秋令金能制木風氣内藏夏至則火盛而金去獨火木旺而脾土損矣輕則飱泄身熱脉洪穀不能化重則下痢膿血稠粘皆屬於火經曰溲而便膿血知氣行而血止也宜大黄湯下之是為重劑黄芩芍藥湯為之輕劑是實則㵼其子木能自虚而脾土實矣故經曰春傷於風夏必飱泄此逆四時之氣人所自為也有自太隂脾經受濕而為水泄虚滑㣲滿身重不知穀味假令春宜益黄散補之夏宜㵼之法云宜補宜㵼宜和宜止假令和則芍藥湯是也止則呵子湯是也久則防變而為膿血脾經傳腎謂之賊邪故難愈若先痢而後滑謂之㣲邪故易痊此皆脾土受實天行為也雖聖智不能逃口食味鼻食氣從鼻而入留積於脾而為水㵼有厥隂經動下痢不止其脉沉而遲手足厥逆涕唾膿血此難治宜麻黄湯小續命汗之法曰謂有表邪縮於内當散表邪而愈有暴下無聲身冷自汗小便清利大便不禁氣難布息脉㣲嘔吐急以重藥温之漿水散是也故法云後重則宜下腹痛則宜和身重則除濕脉弦則去風血膿稠粘以重藥竭之身冷自汗以毒藥溫之風邪内縮宜汗之則愈鶩溏為痢當溫之又云在表者發之在裏者下之在上者湧之在下者竭之身表熱者内踈之小便澁者分利之又曰盛者和之去者送之過者止之兵法云避其來鋭擊其惰歸此之謂也凡病泄而惡風寒是太隂傳少隂是木來尅水也用除濕白术茯苓安脾芍藥桂黄連破血也火邪不能勝水也太隂經不能傳少隂而反火邪上乘肺經而痢必白膿也加黄連當歸之類又裏急後重脉大而洪實為裏熱而甚蔽是有物結墜也若脉浮大甚不宜下雖裏急後重而脉沉細弱者謂寒邪在内而氣散也可溫養而自愈裏急後重閉者大腸經氣不宣通也宜加檳榔木香宣通其氣如痢或泄而嘔者胃中氣不和也上焦不和治以生薑橘皮中焦不和治以芍藥當歸桂茯苓下焦不和寒治以輕熱甚以重熱藥大便虚秘澁久不愈恐太隂傳少隂多傳變為痢太隂傳少隂是為賊邪先以枳實厚朴湯以防其變若四肢懶倦小便少或不利大便走沉困飲食减宜調胃去濕白术芍藥茯苓三味水煎服以白术之甘能入胃而除脾胃之濕芍藥之酸澁除胃中之濕熱四肢困茯苓之淡泄能通水道走濕此三味泄痢須用此如發熱惡寒腹不痛加黄芩為主如未見膿而惡寒乃太隂欲傳少隂也加黄連為主桂枝佐之如腹痛甚者加當歸倍芍藥如見血加黄連為主桂當歸佐之如燥煩或先便白膿後血或發熱或惡寒非黄芩不止上部血也如惡寒脉沉或白腰痛或血臍下痛非黄連不能止此中部血也如惡寒脉沉先血後便非地榆不能除此下部邪也血也如便膿血相雜而脉浮大慎不可以大黄下之下之必死謂氣下竭也而陽無所收也凡隂陽不和唯可以分隂陽藥治之又云暴泄非隂久泄非陽大便完穀下有寒有熱者脉疾身多動音聲響亮暴注下迫此陽也寒者脉沉而細疾身不動作目睛不可了了飲食不下鼻凖氣息者薑附湯主之若身重四肢不舉术附湯主之治泄痢腹痛或後重身熱久而不愈脉洪疾者反下痢膿血稠粘黄芩芍藥湯黄芩芍藥各一兩甘草五錢右為麄末毎服半兩水一盞半煎至一盞溫服清無時如痛則加桂少許治泄痢久不愈膿血稠粘裏急後重日夜無度久不愈者用大黄湯大黄一兩右為細剉好酒二大盞同浸半日許再同煎至一盞半去大黄不用將酒分為二服頓服之痢止一服如未止再服以利為度服芍藥湯和之痢止再服黄芩芍藥湯和之以徹其毒也芍藥湯下血調氣經曰溲而便膿氣行而血止行血則便自愈調氣則後重除芍藥一兩當歸半兩黄連半兩檳榔二錢木香二錢甘草二錢炒大黄三錢黄芩半兩官桂二錢半右㕮咀每服半兩水二盞煎至一盞食後溫服清如血痢則漸加大黄如汗後藏毒加黄蘗半兩依前服白术黄耆湯服前藥痢雖已除猶宜此藥和之白术一兩黄耆七錢甘草三錢右㕮咀勻作三服水一盞半煎至一盞去滓温服清治泄痢飱泄身熱脉弦腹痛而渇及頭痛㣲汗宜防風芍藥湯防風芍藥黄芩各一兩右㕮咀毎服半兩或一兩水三盞煎至一盞温服清治太隂脾經受濕水泄注下體㣲重㣲滿困弱無力不欲飲食暴洩無數水穀不化先宜白术芍藥湯和之身重暴下是大勢來亦宜和之白术芍藥湯白术一兩芍藥一兩甘草五錢右剉毎服一兩水二盞煎至一盞溫服清如痛甚者宜蒼术芍藥湯蒼术二兩芍藥一兩黄芩半兩右剉每服一兩加淡味桂半錢水一盞半煎至一盞溫服清如脉弦頭㣲痛者宜蒼术防風湯蒼术防風各二兩上使右剉同前煎服如下血者宜蒼术地榆湯蒼术二兩地榆一兩下使右剉同前煎服已上證如心下痞每服各加枳實一錢如小便不利毎服各加茯苓二錢如腹痛漸已㵼下㣲少宜訶子散止之法云大勢已去而宜止之訶子散訶子一兩半生半熟木香半兩黄連三錢甘草三錢右為細末毎服三錢以白术芍藥湯調下如止之不已宜歸而送之也訶子散加厚朴一兩竭其邪氣也虚滑久不愈者多待變為痢疾太隂傳待少隂是為鬼邪先以厚朴枳實湯防其待變厚朴枳實湯厚朴一兩剉枳實一兩剉訶子一兩半生半熟半木香半兩黄連二錢甘草三錢炙大黄三錢右為細末毎服三五錢水一盞半煎至一盞去滓溫服治暴泄如水周身汗出一身盡冷脉㣲而弱氣少而不能語其甚者加吐此謂急病宜治之以漿水散半夏湯洗二兩附子半兩炮乾薑五錢良薑二錢半桂五錢甘草五錢炙右為細末每服三五錢漿水二盞煎至一盞和滓熱服甚者三四服㣲者三服太陽經動下痢為鶩溏大腸不能禁固卒然而下成小泊光色其中或有硬物欲起而又下欲了而不了小便多清此寒也宜温之春夏桂枝秋冬白术湯桂枝湯桂白术芍藥各半兩甘草二錢炙右剉每服半兩水一盞煎至七分去滓溫服淸白术湯白术芍藥各三錢乾薑半兩炒甘草二錢炙右剉為麄末如前服之甚則去乾薑加附子三錢辛能發也治厥隂動為㵼痢者寸脉沉而遲手足厥逆下部脉不至咽喉不利或涕唾膿血㵼痢不止者為難治宜升麻湯或小續命湯以發之法云謂表邪縮于内故下痢不止當散表邪于四肢布於絡脉外無其邪則藏府自安矣治水積入胃名曰溢飲滑泄渇能飲水水下復㵼而又渇此無藥證當灸大推諸㵼痢久不止或暴下者皆太隂受病故不可離于芍藥若不受濕不能下痢故須用白术是以聖人立法若四時下痢於芍藥白术内春加防風夏加黄芩秋加厚朴冬加桂附然更詳外證寒熱處之如裏急後重須加大黄如身困倦須加白术如通身自汗逆冷氣息㣲加桂附以温之如或後重膿血稠粘雖在盛冬於溫藥内亦加大黄諸下痢之後小便利而腹中虚痛不可忍者此謂隂陽交錯不和之甚也當服神效越桃散大梔子三錢髙良薑三錢右和勻毎服三錢米飲或酒調下其痛立效治大便後下血腹中不痛謂之濕毒下血宜服黄連湯黄連去須當歸各半兩甘草二錢炙右㕮咀毎服五錢水一盞煎至七分食後温服治大便後下血腹中痛者謂熱毒下血當服芍藥黄連湯芍藥當歸黄連各半兩大黄一錢桂淡味半錢甘草一錢炙右㕮咀毎服半兩同前煎服如痛甚者調木香㯽榔末一錢服之治久病腸風痛痒不任大便下血地榆湯蒼术去皮四兩地榆二兩右㕮咀每服一兩水一盞煎至七分食前多服除根治濕㵼茯苓湯白术一兩茯苓去皮七錢半右㕮咀水煎一兩食前服食入而㵼謂胃中有宿穀也當枳實五錢酒入而㵼温熱㵼也加黄芩五錢治寒積痢男子小児婦人皆不同赤白或清痢如水不後重者寒也經云澄徹清冷皆屬於寒此為虚寒中有積也宜附子巴豆之類下之見利則愈空心服治㵼痢久藏府不止虚滑穀不化用蒼术湯下桃花丸蒼术二兩防風二兩右剉細水用一椀煎至一大盞絞清汁下桃花丸八十丸立愈如小便澁少以五苓散下桃花丸或赤石脂丸小便利則愈矣太陽為脇熱痢凉膈散主之陽明為痼瘕進退大承氣湯主之珎珠囊中有少陽風氣自動其脉弦大柴胡湯主之太隂濕勝濡㵼不可利而可溫四逆湯主之少隂蟄封不動禁固可澁赤石脂丸乾薑湯主之厥隂風泄以風治風小續命湯消風散主之治下痢膿血裏急後重日夜無度𨗳氣湯芍藥一兩當歸五錢大黄黄芩各一錢半黄連木香各一錢㯽榔一錢右為末每服三五錢水一盞煎至七分去滓温服清如未止再煎服不後重則止雜例溲而便膿者小腸泄也脉五至之上洪者宜以七宣丸如脉平者立秋至春分宜香連丸春分至立秋宜芍藥蘗皮四季通用宜加减平胃散七宣丸之類後宜服此藥去其餘邪兼平胃氣芍藥蘖皮丸芍藥黄蘖各等分右為細末醋糊為丸如桐子大毎服五七十丸至二百丸溫水下食前加减平胃散白术厚朴陳皮各一兩甘草七錢㯽榔三錢木香三錢桃仁黄連人參阿膠各半兩白茯苓去皮半兩右為細末同平胃散煎服血多加桃仁泄加黄連小便澁加茯苓氣不下後重加㯽榔木香腹痛加芍藥甘草膿加阿膠濕加白术脉洪加大黄四時以胃氣為本久下血痢則脾虚損而血不流於四肢入於胃中為血宜滋養脾胃則愈夫五洩者之病其治法各不同者外證各異也胃泄者飲食不化多黄承氣湯下脾泄者腹脹滿泄注食即嘔吐逆津建中理中大腸泄者食已逼窘迫大便白腸鳴切痛乾薑附子小腸泄者溲便膿血少腹痛承氣湯大瘕泄者裏急後重數至圊而不能便足少隂是也莖中痛急利小便此五㵼之病也胃小腸大瘕三證皆清凉飲子主之其泄自止後厥隂少隂二證另有治法厥隂證而加甘草謂主莖中痛是肝也内經曰肝苦急急食甘以緩之少隂經證多裏急後重故加大黄令急推過物去則輕矣内經曰因其重而减之又曰在下者引而竭之又有太隂陽明二經證當進退大承氣主之太隂證不能食也當先補而後㵼之乃進藥法也先煎厚朴半兩俱依本方加製水一盞半煎至一半服若三兩服後未已謂有宿食不消又加枳實二錢同煎服三兩服泄又未已如稍加食尚有熱毒又加大黄三錢推過泄止住藥如泄未止謂腸胃有久塵垢滑粘加芒硝半合宿垢去盡則愈也陽明證能食是也當先㵼而後補謂退藥法也先用大承氣湯五錢水一盞依前法煎至七分稍熱服如泄未止去芒硝後稍熱退减大黄一半煎兩服如熱氣雖已其人必腹滿又减去大黄枳實厚朴湯又煎三兩服如腹脹滿退泄亦自愈後服厚朴湯數服則已又寒熱水洩之例于后洩者一也總包五法謂之六義曰六解難經有傷寒五泄叔和云濕多成五洩仲景解四經泄痢有不可汗有不可下者可吐可灸者仲景隨經自言之假令渇引飲者是熱在膈上水多入則下鬲入胃中胃經本無熱不勝其水名曰水恣故使米穀一時下此證當灸大推三五壯立已乃㵼督也如用藥使車前子雷丸白术茯苓之類可選用之五苓散亦可又有寒泄者大腹滿而泄又有鶩溏者是寒泄也鴨溏者大便如水中有少結糞者是也如此者當用天麻附子乾薑之類是也又法曰泄有虚實寒熱虛則無力粘衣不便已洩出謂不能禁固也實則數至圊而不能便俗云虛坐努責是也裏急後重皆依前法進退大承氣湯主之一説素問云春傷於風夏必飱泄又云久風為飱泄泄者乃水穀不化而完出非水入胃而成此證非前水恣也此一證不飲水而穀完出名曰飱泄治法於後先以宣風散𨗳之出錢氏方中四味者是也後服蒼术防風湯蒼术去皮四兩麻黄去根節四兩防風去芦頭五錢右為麄末每服一兩生薑七片水二盞煎至一盞去滓溫服泄止後服椒术丸蒼术二兩小椒一兩去目炒右為極細末醋糊為丸如桐子大每服二十丸或三十丸食前溫水下一法惡痢久不愈者彌加如小兒病丸如黍米大治㵼痢膿血乃至脱肛地榆芍藥湯蒼术八兩地榆三兩卷柏三兩芍藥三兩右㕮咀毎服一兩水一大盞半煎至一半温服清病退藥止五泄傷寒乃分三節初説暴次説中後説久泄此説在難經二十二難是三節内包十五法初以暴藥中以的對證藥後疾得中也末治久泄法仲景論厥隂經治法是也治久泄法先進縮煎小續命湯是發其汗使邪氣不能侵于内然後治其痢秋冬間下痢風吐論中加减厚朴丸大效凡藏府之秘不可一例治療有虛秘有實秘胃實而秘者能飲食小便赤當以麻仁丸七宣丸之類主之胃虛而秘者不能飲食小便清利厚朴湯主之厚朴薑制一兩白术五兩半夏麴二兩枳實一兩炒陳皮去白一兩甘草三兩炙右為麄末毎服三五錢水一盞半生薑五片棗三枚煎至一盞去滓溫服空心實秘者物也虛秘者氣也平胃丸治病久虚弱厭厭不能食而藏府或秘或溏此胃氣虗弱也常服和中消痰去濕及厚腸胃進飲食厚朴一兩白术一兩二錢陳皮八錢去白木香一錢生半夏湯洗二兩檳榔二錢半枳實半錢甘草三錢炙右為細末薑汁浸蒸餅丸桐子大毎服三五十丸生薑湯或温水送下心痛論第二十論曰諸心痛者皆少隂厥氣上衝也有熱厥心痛者身熱是寒痛甚則煩燥而吐額自汗出知為熱也其脉洪大當灸大谿及崑崙謂表裏俱㵼之是謂熱病汗不出引熱下行表汗通身而出者愈也灸畢服金鈴子散痛止服枳术丸去其餘邪也有實心中痛者因氣而食卒然發痛大便或秘久而注悶心胷髙起按之愈痛不能飲食急以煮黄丸利之利後以槀本湯去其餘邪有寒厥心痛者手足逆而通身冷汗出便利溺清或大便利而不渇氣㣲力弱急以术附湯溫之寒厥暴痛非久病也朝發暮死當急救之是知久痛無寒而暴痛非熱也治熱厥心痛或發或止久不愈者當用金鈴子散金鈴子𤣥胡各一兩右為細末毎服三錢酒調下大實心痛煮黄丸雄黄一兩研已豆五錢去皮生用研細入雄黄末右再研二味白麵二兩同和再研勻滴水丸如桐子大毎服時先煎漿水令沸下藥二十四丸煮一二十沸撈入冷漿水沉冷一時服一丸二日二十四時加至㣲利為度用浸藥水送下此治脇下痃癖痛如神治大實心痛大便已利宜藁本湯徹其痛也藁本半兩蒼术一兩右為麄末毎服一兩水二盞煎至一盞温服清治寒厥暴痛脉㣲氣弱宜术附湯术附湯附子一兩炮去皮臍細切一兩白术四兩甘草二兩炒右為麄末入附子令勻毎服三錢水一大盞半入生薑五片棗一枚劈破同煎至一盞去滓溫服食前此藥又治風濕相搏身重疼煩不能轉側不嘔不渇大便堅硬小便自利及風虚頭目眩重者不知食味暖肌補中助陽氣止自汗治男子婦人心經中搐熱如癎病狀宜服妙香丸風癎者煎羌活為引下妙香丸血癎當歸湯引下刺心痛諸穴於後真心痛手足青至節痛甚旦發夕死夕發旦死心痛腹脹嗇嗇然大便不利取足太隂心痛引腰脊欲嘔取刺足少隂心痛引小腹滿上下無常處便溺難刺足厥隂心痛短氣刺手太隂心痛當九節刺之立已不已上下求之得之則已接經三法心痛與背相接善恐如從後觸其心傴僂者腎心痛也先刺經骨崑崙不已刺合骨心痛腹脹胷滿心尤痛者胃心痛也刺太都太白二穴心痛如錐刺乃脾心痛也刺然谷太谿心痛蒼然如死狀終日不得休息乃肝心痛刺行間太衝心痛卧若徒居心痛間動作益痛甚者其色不變此肺心痛也刺魚際太淵宣通氣行無所凝滯則病愈也太谿穴足少隂腎經土也為腧在足内踝後根骨上脉動陷中可灸三壯或五七壯此瀉熱厥心痛崑崙足太陽膀胱經水也在足外踝後根骨上陷中可灸三壯或五七壯亦可瀉熱厥痛保命集卷中
